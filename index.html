<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aspect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
@property --fill { syntax: '<angle>'; initial-value: 0deg; inherits: false; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f8fa;
  --bg-soft: #ebf2f6;
  --fg: #2c3e50;
  --fg-muted: #6e8290;
  --fg-faint: #aabbc4;
  --line: #cfdce4;
  --line-soft: #e2eaee;
  --accent: #5b9cb8;
  --accent-soft: #c4dde8;
  --serif: 'Cormorant Garamond', 'Noto Serif JP', serif;
  --sans: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
}

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--sans);
  font-weight: 300;
  font-size: 13px;
  letter-spacing: 0.02em;
  display: grid;
  grid-template-columns: 280px 1fr;
}

/* ===== Sidebar ===== */
aside {
  border-right: 1px solid var(--line);
  overflow-y: auto;
  background: var(--bg);
}
aside::-webkit-scrollbar { width: 6px; }
aside::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

.brand {
  font-family: var(--serif);
  font-style: italic;
  font-size: 30px;
  font-weight: 400;
  letter-spacing: -0.01em;
  padding: 36px 28px 24px;
  line-height: 1;
  color: var(--fg);
}
.brand .dot { color: var(--accent); }

.category { border-top: 1px solid var(--line-soft); }
.category:last-child { border-bottom: 1px solid var(--line-soft); }
.category-header {
  padding: 13px 28px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  user-select: none;
  transition: color 0.2s, background 0.2s;
  font-size: 12.5px;
  color: var(--fg);
}
.category-header:hover { color: var(--accent); }
.category-header .arrow {
  font-family: var(--serif);
  font-style: italic;
  color: var(--fg-faint);
  font-size: 14px;
  transition: transform 0.25s ease;
}
.category.open .arrow { transform: rotate(90deg); color: var(--accent); }

.items { display: none; padding: 4px 0 14px; }
.category.open .items { display: block; }

.item {
  display: grid;
  grid-template-columns: 24px 1fr auto;
  grid-template-areas: "icon label ratio" ".    note  note";
  gap: 0 10px;
  align-items: center;
  padding: 7px 28px 7px 22px;
  cursor: pointer;
  transition: background 0.15s, box-shadow 0.15s;
}
.item:hover { background: var(--bg-soft); }
.item.active { box-shadow: inset 2px 0 0 var(--accent); }

.item-icon-slot { grid-area: icon; width: 24px; height: 16px; display: flex; align-items: center; overflow: hidden; }
.item-icon { height: 14px; width: auto; max-width: 24px; object-fit: contain; display: block; opacity: 0.85; }
.item-label { grid-area: label; font-size: 12px; line-height: 1.35; color: var(--fg); }
.item-ratio { grid-area: ratio; font-family: var(--serif); font-style: italic; color: var(--fg-faint); font-size: 13px; white-space: nowrap; }
.item.active .item-ratio { color: var(--accent); }
.item-note { grid-area: note; font-size: 9.5px; color: var(--fg-faint); margin-top: 2px; line-height: 1.3; }

/* ===== Main ===== */
main {
  display: grid;
  grid-template-rows: auto 1fr auto auto;
  overflow: hidden;
  min-width: 0;
}

header.info {
  padding: 26px 40px 8px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 24px;
  flex-wrap: wrap;
}
.ratio-label { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.name-row { display: flex; align-items: center; gap: 12px; }
.ratio-icon-slot {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ratio-icon-slot:empty { display: none; }
.ratio-icon-slot img { height: 24px; width: auto; max-width: 28px; object-fit: contain; opacity: 0.85; }

.item-big {
  font-size: 24px;
  font-weight: 400;
  color: var(--fg);
  letter-spacing: 0;
  line-height: 1.15;
}
.ratio-small {
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  color: var(--fg-muted);
  letter-spacing: 0;
}
.ratio-small .colon { margin: 0 3px; color: var(--fg-faint); font-style: normal; }

.file-info {
  text-align: right;
  font-family: var(--serif);
  font-style: italic;
  color: var(--fg-muted);
  line-height: 1.5;
  display: flex;
  flex-direction: column;
  gap: 2px;
  align-items: flex-end;
}
.file-info .size { font-size: 14px; color: var(--fg); }
.file-info .dim { font-size: 12px; color: var(--fg-muted); }

/* ===== Canvas/Preview ===== */
.canvas-wrap {
  position: relative;
  margin: 4px 40px;
  overflow: hidden;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.preview-stack {
  position: relative;
  display: none;
}
.preview-stack.shown { display: block; }
.preview-img {
  position: absolute;
  display: block;
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: none;
}
.overlay {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  touch-action: none;
  cursor: default;
}
.empty-msg {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--fg-faint);
  font-family: var(--serif); font-style: italic; font-size: 16px;
  pointer-events: none;
  letter-spacing: 0.02em;
}
.empty-msg.hidden { display: none; }

/* ===== Image tools ===== */
.image-tools {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 16px;
  padding: 8px 0 4px;
}
.tool-btn {
  width: 40px; height: 40px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.6);
  cursor: pointer;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--fg);
  transition: all 0.2s ease;
  padding: 0;
}
.tool-btn:hover:not(:disabled) {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(255,255,255,0.9);
}
.tool-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.tool-btn svg { display: block; }

.tool-divider { width: 1px; height: 22px; background: var(--line); margin: 0 4px; }

.brightness-btn {
  --fill: 0deg;
  position: relative;
  width: 40px; height: 40px;
  border: none; background: none;
  cursor: pointer; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--fg);
  padding: 0;
  transition: --fill 0.35s ease, color 0.15s;
}
.brightness-btn::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 50%;
  background: conic-gradient(from -90deg, var(--accent) var(--fill), var(--line) 0);
  -webkit-mask: radial-gradient(circle, transparent 14.5px, black 15px, black 19px, transparent 19.5px);
  mask: radial-gradient(circle, transparent 14.5px, black 15px, black 19px, transparent 19.5px);
  pointer-events: none;
}
.brightness-btn:hover:not(:disabled) { color: var(--accent); }
.brightness-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.brightness-btn svg { position: relative; z-index: 1; }

/* ===== Footer controls ===== */
footer.controls {
  padding: 14px 40px 26px;
  display: flex;
  align-items: center;
  gap: 24px;
  border-top: 1px solid var(--line-soft);
  flex-wrap: wrap;
}
.btn {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  background: none;
  border: 1px solid var(--fg);
  color: var(--fg);
  padding: 10px 22px;
  cursor: pointer;
  transition: all 0.2s ease;
  border-radius: 0;
  white-space: nowrap;
}
.btn:hover:not(:disabled) {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.btn:disabled { border-color: var(--fg-faint); color: var(--fg-faint); cursor: not-allowed; }
.btn .fmt {
  font-family: var(--serif); font-style: italic;
  font-size: 13px; letter-spacing: 0;
  text-transform: lowercase; margin-left: 6px; opacity: 0.7;
}

.splits {
  display: flex; gap: 22px;
  margin-left: auto; align-items: center;
}
.split-field {
  display: flex; align-items: center;
  gap: 7px;
}
.split-field .lbl {
  font-size: 11px; color: var(--fg-muted);
  letter-spacing: 0.06em;
}
.split-field .num {
  font-family: var(--serif);
  font-style: italic;
  font-size: 22px;
  color: var(--fg);
  min-width: 18px;
  text-align: center;
  line-height: 1;
  user-select: none;
}
.split-field .unit {
  font-size: 11px;
  color: var(--fg-faint);
}
.arrows {
  display: flex;
  flex-direction: column;
  margin-left: 2px;
}
.arr {
  width: 16px;
  height: 12px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--fg-faint);
  font-size: 8px;
  padding: 0;
  line-height: 1;
  transition: color 0.15s, transform 0.1s;
  user-select: none;
}
.arr:hover { color: var(--accent); }
.arr:active { transform: scale(0.85); }

@media (max-width: 760px) {
  body { grid-template-columns: 1fr; grid-template-rows: 200px 1fr; }
  aside { border-right: none; border-bottom: 1px solid var(--line); }
  .brand { padding: 16px 22px 12px; font-size: 24px; }
  header.info { padding: 16px 22px 6px; gap: 12px; align-items: flex-start; }
  .item-big { font-size: 20px; }
  .file-info { align-items: flex-start; text-align: left; }
  .canvas-wrap { margin: 4px 22px; }
  footer.controls { padding: 12px 22px 18px; gap: 16px; }
  .splits { margin-left: 0; gap: 18px; }
}
</style>
</head>

  </footer>
</main>

const BRIGHTNESS_STEP = 0.08;
const BRIGHTNESS_MAX  = 5;

const state = {
  ratio: null,
  fileType: null,
  fileSize: 0,
  naturalW: 0, naturalH: 0,
  fileUrl: null,
  gifBuffer: null,
  gifDecoded: null,
  rotation: 0, flipH: false, flipV: false,
  brightness: 0,
  splitW: 1, splitH: 1,
  canvasW: 0, canvasH: 0,
  frameX: 0, frameY: 0, frameW: 0, frameH: 0,
  dragging: false, dragOffX: 0, dragOffY: 0,
  resizing: false, resizeAnchorX: 0, resizeAnchorY: 0,
  activeItemEl: null,
  loaded: false,
};

const HANDLE_R = 7;
const HANDLE_HIT_R = 14;
const MIN_FRAME = 24;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');
const previewStack = document.getElementById('previewStack');
const previewImg = document.getElementById('previewImg');
const emptyMsg = document.getElementById('emptyMsg');
const ratioIconSlot = document.getElementById('ratioIconSlot');
const ratioText = document.getElementById('ratioText');
const ratioName = document.getElementById('ratioName');
const fileSizeEl = document.getElementById('fileSize');
const dimLine = document.getElementById('dimLine');
const saveBtn = document.getElementById('save');
const fileInput = document.getElementById('file');
const splitWNum = document.getElementById('splitWNum');
const splitHNum = document.getElementById('splitHNum');
const flipHBtn = document.getElementById('flipH');
const flipVBtn = document.getElementById('flipV');
const rotateBtn = document.getElementById('rotate');
const brightnessBtn = document.getElementById('brightness');

/* ===== Sidebar ===== */
function renderSidebar() {
  const root = document.getElementById('categories');
  CATEGORIES.forEach(cat => {
    const w = document.createElement('div');
    w.className = 'category';
    const h = document.createElement('div');
    h.className = 'category-header';
    h.innerHTML = `<span>${cat.name}</span><span class="arrow">›</span>`;
    h.addEventListener('click', () => w.classList.toggle('open'));
    const items = document.createElement('div');
    items.className = 'items';
    cat.items.forEach(it => {
      const el = document.createElement('div');
      el.className = 'item';
      const ic = it.icon
        ? `<span class="item-icon-slot"><img class="item-icon" src="${it.icon}" alt=""></span>`
        : `<span class="item-icon-slot"></span>`;
      const nt = it.note ? `<span class="item-note">${it.note}</span>` : '';
      el.innerHTML = `${ic}<span class="item-label">${it.name}</span><span class="item-ratio">${it.w} : ${it.h}</span>${nt}`;
      el.addEventListener('click', () => selectItem(it, el));
      items.appendChild(el);
    });
    w.appendChild(h); w.appendChild(items);
    root.appendChild(w);
  });
}

function selectItem(item, el) {
  state.ratio = item;
  if (state.activeItemEl) state.activeItemEl.classList.remove('active');
  el.classList.add('active');
  state.activeItemEl = el;
  ratioText.innerHTML = `${item.w}<span class="colon">:</span>${item.h}`;
  ratioName.textContent = item.name;
  ratioIconSlot.innerHTML = item.icon ? `<img src="${item.icon}" alt="">` : '';
  recalculateFrame();
  draw();
  updateDimLine();
  updateSaveBtn();
}

/* ===== Layout ===== */
function recomputeLayout() {
  if (!state.loaded) {
    previewStack.classList.remove('shown');
    return;
  }
  const cw = wrap.clientWidth, ch = wrap.clientHeight;
  if (cw <= 0 || ch <= 0) return;
  const isRot90 = state.rotation === 90 || state.rotation === 270;
  const effW = isRot90 ? state.naturalH : state.naturalW;
  const effH = isRot90 ? state.naturalW : state.naturalH;
  const r = effW / effH;
  let dw = cw, dh = cw / r;
  if (dh > ch) { dh = ch; dw = ch * r; }

  state.canvasW = dw;
  state.canvasH = dh;

  previewStack.classList.add('shown');
  previewStack.style.width = dw + 'px';
  previewStack.style.height = dh + 'px';

  // img element pre-rotation dimensions (for the CSS rotate to land in the box)
  let preW, preH;
  if (isRot90) { preW = dh; preH = dw; }
  else { preW = dw; preH = dh; }
  previewImg.style.width = preW + 'px';
  previewImg.style.height = preH + 'px';
  previewImg.style.left = '50%';
  previewImg.style.top = '50%';
  updatePreviewTransform();

  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.floor(dw * dpr);
  canvas.height = Math.floor(dh * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  recalculateFrame();
  draw();
  updateDimLine();
}

function updatePreviewTransform() {
  if (!state.loaded) return;
  const sx = state.flipH ? -1 : 1;
  const sy = state.flipV ? -1 : 1;
  previewImg.style.transform =
    `translate(-50%, -50%) rotate(${state.rotation}deg) scale(${sx}, ${sy})`;
  previewImg.style.filter = state.brightness > 0
    ? `brightness(${1 + state.brightness * BRIGHTNESS_STEP})`
    : '';
}

function getEffectiveRatio() {
  if (!state.ratio) return 1;
  return (state.ratio.w * state.splitW) / (state.ratio.h * state.splitH);
}

function recalculateFrame() {
  if (!state.loaded || !state.ratio) return;
  const t = getEffectiveRatio();
  let fw = state.canvasW, fh = fw / t;
  if (fh > state.canvasH) { fh = state.canvasH; fw = fh * t; }
  state.frameW = fw; state.frameH = fh;
  state.frameX = (state.canvasW - fw) / 2;
  state.frameY = (state.canvasH - fh) / 2;
}

/* ===== Draw overlay (mask + frame + handle) ===== */
function draw() {
  if (!state.canvasW || !state.canvasH) return;
  ctx.clearRect(0, 0, state.canvasW, state.canvasH);
  if (!state.loaded || !state.ratio) return;

  // Dark mask outside frame
  ctx.fillStyle = 'rgba(20,30,40,0.45)';
  if (state.frameY > 0) ctx.fillRect(0, 0, state.canvasW, state.frameY);
  const fB = state.frameY + state.frameH;
  if (fB < state.canvasH) ctx.fillRect(0, fB, state.canvasW, state.canvasH - fB);
  if (state.frameX > 0) ctx.fillRect(0, state.frameY, state.frameX, state.frameH);
  const fR = state.frameX + state.frameW;
  if (fR < state.canvasW) ctx.fillRect(fR, state.frameY, state.canvasW - fR, state.frameH);

  // Frame border
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(state.frameX + 0.5, state.frameY + 0.5, state.frameW - 1, state.frameH - 1);

  // Split dotted lines
  if (state.splitW > 1 || state.splitH > 1) {
    ctx.save();
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.lineWidth = 1;
    for (let i = 1; i < state.splitW; i++) {
      const x = state.frameX + (state.frameW * i) / state.splitW;
      ctx.beginPath(); ctx.moveTo(x + 0.5, state.frameY); ctx.lineTo(x + 0.5, state.frameY + state.frameH); ctx.stroke();
    }
    for (let j = 1; j < state.splitH; j++) {
      const y = state.frameY + (state.frameH * j) / state.splitH;
      ctx.beginPath(); ctx.moveTo(state.frameX, y + 0.5); ctx.lineTo(state.frameX + state.frameW, y + 0.5); ctx.stroke();
    }
    ctx.restore();
  }

  // Resize handle top-right
  const hx = state.frameX + state.frameW;
  const hy = state.frameY;
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.arc(hx, hy, HANDLE_R + 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(hx, hy, HANDLE_R, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.arc(hx, hy, HANDLE_R, 0, Math.PI * 2); ctx.stroke();
}

/* ===== Info updates ===== */
function formatBytes(b) {
  if (b == null) return '—';
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1024 / 1024).toFixed(2) + ' MB';
}

function updateFileSize() {
  fileSizeEl.textContent = state.loaded ? formatBytes(state.fileSize) : '—';
}

function updateDimLine() {
  if (!state.ratio || !state.loaded) {
    dimLine.textContent = '— × — px';
    return;
  }
  const isRot90 = state.rotation === 90 || state.rotation === 270;
  const effW = isRot90 ? state.naturalH : state.naturalW;
  const effH = isRot90 ? state.naturalW : state.naturalH;
  const sx = effW / state.canvasW;
  const sy = effH / state.canvasH;
  const tw = Math.round(state.frameW * sx);
  const th = Math.round(state.frameH * sy);
  dimLine.textContent = `${tw} × ${th} px`;
}

function updateEmpty() {
  emptyMsg.classList.toggle('hidden', state.loaded);
}

function updateSaveBtn() {
  const enabled = state.loaded && state.ratio;
  saveBtn.disabled = !enabled;
  if (!enabled) { saveBtn.innerHTML = '保存'; return; }
  const total = state.splitW * state.splitH;
  const fmt = total === 1 ? (state.fileType === 'gif' ? 'gif' : 'png') : 'zip';
  saveBtn.innerHTML = `保存<span class="fmt">${fmt}</span>`;
}

function updateToolBtns() {
  const en = state.loaded;
  [flipHBtn, flipVBtn, rotateBtn, brightnessBtn].forEach(b => b.disabled = !en);
}

function updateBrightnessGauge() {
  const fill = (state.brightness / BRIGHTNESS_MAX) * 360;
  brightnessBtn.style.setProperty('--fill', fill + 'deg');
}

/* ===== File loading: GIFは img にそのまま渡してアニメ再生 =====
   gifuct のデコードは「保存時のみ」遅延実行する。これで読み込みは常に成功する。 */
fileInput.addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) loadFile(f);
});

async function loadFile(file) {
  const isGif = file.type === 'image/gif' || /\.gif$/i.test(file.name);
  state.fileType = isGif ? 'gif' : 'image';
  state.fileSize = file.size;
  state.gifBuffer = null;
  state.gifDecoded = null;
  state.loaded = false;
  state.rotation = 0;
  state.flipH = false;
  state.flipV = false;
  state.brightness = 0;
  updateBrightnessGauge();
  previewStack.classList.remove('shown');
  updateEmpty();
  updateFileSize();

  if (state.fileUrl) URL.revokeObjectURL(state.fileUrl);
  state.fileUrl = URL.createObjectURL(file);

  // GIF の場合は保存時用に ArrayBuffer をバックグラウンド取得しておく
  if (isGif) {
    file.arrayBuffer().then(buf => { state.gifBuffer = buf; }).catch(()=>{});
  }

  try {
    await new Promise((res, rej) => {
      previewImg.onload = () => res();
      previewImg.onerror = () => rej(new Error('load failed'));
      previewImg.src = state.fileUrl;
    });
    state.naturalW = previewImg.naturalWidth;
    state.naturalH = previewImg.naturalHeight;
    state.loaded = true;
    updateFileSize();
    updateEmpty();
    updateToolBtns();
    recomputeLayout();
    updateSaveBtn();
  } catch (err) {
    console.error(err);
    alert('画像を読み込めませんでした');
  }
}

/* ===== Pointer interactions ===== */
function localPos(e) {
  const r = canvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}
function isOnHandle(x, y) {
  const hx = state.frameX + state.frameW;
  const hy = state.frameY;
  return Math.hypot(x - hx, y - hy) <= HANDLE_HIT_R;
}
function isInFrame(x, y) {
  return x >= state.frameX && x <= state.frameX + state.frameW &&
         y >= state.frameY && y <= state.frameY + state.frameH;
}

canvas.addEventListener('pointerdown', e => {
  if (!state.loaded || !state.ratio) return;
  const { x, y } = localPos(e);
  if (isOnHandle(x, y)) {
    state.resizing = true;
    state.resizeAnchorX = state.frameX;
    state.resizeAnchorY = state.frameY + state.frameH;
    canvas.style.cursor = 'nesw-resize';
    canvas.setPointerCapture(e.pointerId);
  } else if (isInFrame(x, y)) {
    state.dragging = true;
    state.dragOffX = x - state.frameX;
    state.dragOffY = y - state.frameY;
    canvas.style.cursor = 'grabbing';
    canvas.setPointerCapture(e.pointerId);
  }
});
canvas.addEventListener('pointermove', e => {
  const { x, y } = localPos(e);
  if (state.resizing) doResize(x, y);
  else if (state.dragging) doDrag(x, y);
  else if (state.loaded && state.ratio) {
    canvas.style.cursor = isOnHandle(x, y) ? 'nesw-resize' : (isInFrame(x, y) ? 'grab' : 'default');
  }
});
function doDrag(px, py) {
  let nx = px - state.dragOffX;
  let ny = py - state.dragOffY;
  nx = Math.max(0, Math.min(state.canvasW - state.frameW, nx));
  ny = Math.max(0, Math.min(state.canvasH - state.frameH, ny));
  state.frameX = nx; state.frameY = ny;
  draw();
}
function doResize(px, py) {
  const aspect = getEffectiveRatio();
  const ax = state.resizeAnchorX;
  const ay = state.resizeAnchorY;
  let w = Math.max(MIN_FRAME, px - ax);
  let h = Math.max(MIN_FRAME, ay - py);
  if (w / h > aspect) h = w / aspect;
  else w = h * aspect;
  const maxW = state.canvasW - ax;
  const maxH = ay;
  if (w > maxW) { w = maxW; h = w / aspect; }
  if (h > maxH) { h = maxH; w = h * aspect; }
  if (w < MIN_FRAME) w = MIN_FRAME;
  if (h < MIN_FRAME) h = MIN_FRAME;
  state.frameX = ax; state.frameY = ay - h;
  state.frameW = w; state.frameH = h;
  draw();
  updateDimLine();
}
function endInteraction() {
  if (state.dragging || state.resizing) {
    state.dragging = false; state.resizing = false;
    canvas.style.cursor = 'default';
  }
}
canvas.addEventListener('pointerup', endInteraction);
canvas.addEventListener('pointercancel', endInteraction);

/* ===== Split arrows (▲▼) ===== */
document.querySelectorAll('.arr').forEach(btn => {
  btn.addEventListener('click', () => {
    const t = btn.dataset.target;
    const d = parseInt(btn.dataset.delta, 10);
    if (t === 'W') {
      state.splitW = Math.max(1, Math.min(50, state.splitW + d));
      splitWNum.textContent = state.splitW;
    } else {
      state.splitH = Math.max(1, Math.min(50, state.splitH + d));
      splitHNum.textContent = state.splitH;
    }
    recalculateFrame();
    draw();
    updateDimLine();
    updateSaveBtn();
  });
});

/* ===== Image transform buttons ===== */
flipHBtn.addEventListener('click', () => {
  state.flipH = !state.flipH;
  updatePreviewTransform();
});
flipVBtn.addEventListener('click', () => {
  state.flipV = !state.flipV;
  updatePreviewTransform();
});
rotateBtn.addEventListener('click', () => {
  state.rotation = (state.rotation + 90) % 360;
  recomputeLayout();
});
brightnessBtn.addEventListener('click', () => {
  state.brightness = (state.brightness + 1) % (BRIGHTNESS_MAX + 1);
  updateBrightnessGauge();
  updatePreviewTransform();
});

/* ===== GIF decode (gifuct-js) ===== */
function decodeGif(arrayBuffer) {
  if (typeof gifuct === 'undefined') {
    throw new Error('GIFパーサーが利用できません');
  }
  const parsed = gifuct.parseGIF(arrayBuffer);
  const raw = gifuct.decompressFrames(parsed, true);
  const W = parsed.lsd.width, H = parsed.lsd.height;
  const work = document.createElement('canvas');
  work.width = W; work.height = H;
  const wctx = work.getContext('2d');
  const out = [];
  let saved = null;
  for (const fr of raw) {
    if (fr.disposalType === 3) saved = wctx.getImageData(0, 0, W, H);
    const patch = document.createElement('canvas');
    patch.width = fr.dims.width; patch.height = fr.dims.height;
    const pctx = patch.getContext('2d');
    const id = pctx.createImageData(fr.dims.width, fr.dims.height);
    id.data.set(fr.patch);
    pctx.putImageData(id, 0, 0);
    wctx.drawImage(patch, fr.dims.left, fr.dims.top);
    const snap = document.createElement('canvas');
    snap.width = W; snap.height = H;
    snap.getContext('2d').drawImage(work, 0, 0);
    out.push({ canvas: snap, delay: Math.max(20, fr.delay || 100) });
    if (fr.disposalType === 2) wctx.clearRect(fr.dims.left, fr.dims.top, fr.dims.width, fr.dims.height);
    else if (fr.disposalType === 3 && saved) wctx.putImageData(saved, 0, 0);
  }
  return { width: W, height: H, frames: out };
}

/* ローカル gif.worker.js を直接参照(CORSや fetch 失敗を回避) */
function transformFrameCanvas(srcCanvas) {
  const sw = srcCanvas.width, sh = srcCanvas.height;
  const isRot90 = state.rotation === 90 || state.rotation === 270;
  const outW = isRot90 ? sh : sw;
  const outH = isRot90 ? sw : sh;
  const c = document.createElement('canvas');
  c.width = outW; c.height = outH;
  const cx = c.getContext('2d');
  cx.save();
  cx.translate(outW / 2, outH / 2);
  cx.rotate(state.rotation * Math.PI / 180);
  cx.scale(state.flipH ? -1 : 1, state.flipV ? -1 : 1);
  cx.drawImage(srcCanvas, -sw / 2, -sh / 2);
  cx.restore();
  return c;
}

function cropGifToBlob(decoded, sx, sy, sw, sh) {
  const w = Math.max(1, Math.round(sw));
  const h = Math.max(1, Math.round(sh));
  const brightness = state.brightness > 0
    ? `brightness(${1 + state.brightness * BRIGHTNESS_STEP})`
    : null;
  return new Promise((resolve, reject) => {
    const gif = new GIF({
      workers: 2,
      quality: 10,
      workerScript: GIF_WORKER_PATH,
      width: w, height: h,
    });
    for (const fr of decoded.frames) {
      const transformed = transformFrameCanvas(fr.canvas);
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      const cx = c.getContext('2d');
      if (brightness) cx.filter = brightness;
      cx.drawImage(transformed, sx, sy, sw, sh, 0, 0, w, h);
      gif.addFrame(c, { delay: fr.delay, copy: true });
    }
    gif.on('finished', resolve);
    gif.on('abort', () => reject(new Error('aborted')));
    gif.render();
  });
}

/* ===== Save ===== */
function sanitize(name) {
  return name.replace(/[\/\\?%*:|"<>]/g, '_').trim() || 'aspect';
}
function download(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

async function save() {
  if (!state.loaded || !state.ratio) return;
  const total = state.splitW * state.splitH;
  const isGif = state.fileType === 'gif';
  const baseName = sanitize(state.ratio.name);
  saveBtn.disabled = true;
  const orig = saveBtn.innerHTML;

  try {
    const isRot90 = state.rotation === 90 || state.rotation === 270;
    const effW = isRot90 ? state.naturalH : state.naturalW;
    const effH = isRot90 ? state.naturalW : state.naturalH;
    const sxR = effW / state.canvasW;
    const syR = effH / state.canvasH;
    const cellW = state.frameW / state.splitW;
    const cellH = state.frameH / state.splitH;
    const cells = [];
    for (let j = 0; j < state.splitH; j++) {
      for (let i = 0; i < state.splitW; i++) {
        cells.push({
          x: (state.frameX + i * cellW) * sxR,
          y: (state.frameY + j * cellH) * syR,
          w: cellW * sxR,
          h: cellH * syR,
        });
      }
    }

    if (isGif) {
      if (!state.gifDecoded) {
        saveBtn.innerHTML = 'GIF解析中…';
        if (!state.gifBuffer) {
          const r = await fetch(state.fileUrl);
          state.gifBuffer = await r.arrayBuffer();
        }
        state.gifDecoded = decodeGif(state.gifBuffer);
      }
      const blobs = [];
      for (let k = 0; k < cells.length; k++) {
        saveBtn.innerHTML = `書き出し ${k + 1}/${cells.length}`;
        const c = cells[k];
        blobs.push(await cropGifToBlob(state.gifDecoded, c.x, c.y, c.w, c.h));
      }
      if (total === 1) {
        download(blobs[0], baseName + '.gif');
      } else {
        saveBtn.innerHTML = 'zip 生成中…';
        const zip = new JSZip();
        const pad = Math.max(2, String(total).length);
        blobs.forEach((b, i) => zip.file(String(i + 1).padStart(pad, '0') + '.gif', b));
        const zb = await zip.generateAsync({ type: 'blob' });
        download(zb, baseName + `_${state.splitW}x${state.splitH}.zip`);
      }
    } else {
      // Static: render source with transforms baked, then crop cells
      const tw = effW, th = effH;
      const sourceCanvas = document.createElement('canvas');
      sourceCanvas.width = tw; sourceCanvas.height = th;
      const scx = sourceCanvas.getContext('2d');
      if (state.brightness > 0) scx.filter = `brightness(${1 + state.brightness * BRIGHTNESS_STEP})`;
      scx.save();
      scx.translate(tw / 2, th / 2);
      scx.rotate(state.rotation * Math.PI / 180);
      scx.scale(state.flipH ? -1 : 1, state.flipV ? -1 : 1);
      scx.drawImage(previewImg, -state.naturalW / 2, -state.naturalH / 2);
      scx.restore();

      const blobs = [];
      for (const c of cells) {
        const off = document.createElement('canvas');
        off.width = Math.max(1, Math.round(c.w));
        off.height = Math.max(1, Math.round(c.h));
        off.getContext('2d').drawImage(sourceCanvas, c.x, c.y, c.w, c.h, 0, 0, off.width, off.height);
        const blob = await new Promise(res => off.toBlob(res, 'image/png'));
        blobs.push(blob);
      }
      if (total === 1) {
        download(blobs[0], baseName + '.png');
      } else {
        const zip = new JSZip();
        const pad = Math.max(2, String(total).length);
        blobs.forEach((b, i) => zip.file(String(i + 1).padStart(pad, '0') + '.png', b));
        const zb = await zip.generateAsync({ type: 'blob' });
        download(zb, baseName + `_${state.splitW}x${state.splitH}.zip`);
      }
    }
  } catch (err) {
    console.error(err);
    alert('保存に失敗しました: ' + err.message);
  } finally {
    saveBtn.innerHTML = orig;
    updateSaveBtn();
  }
}
saveBtn.addEventListener('click', save);

/* ===== Init ===== */
renderSidebar();
window.addEventListener('resize', recomputeLayout);
new ResizeObserver(recomputeLayout).observe(wrap);
recomputeLayout();
updateEmpty();
updateSaveBtn();
updateToolBtns();
updateBrightnessGauge();
</script>
</body>
