<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aspect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f4f1ea;
  --bg-soft: #ede9df;
  --fg: #1a1a1a;
  --fg-muted: #7a766d;
  --fg-faint: #b8b3a6;
  --line: #d9d3c5;
  --line-soft: #e6e1d4;
  --serif: 'Cormorant Garamond', 'Noto Serif JP', serif;
  --sans: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
}

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--sans);
  font-weight: 300;
  font-size: 13px;
  letter-spacing: 0.02em;
  display: grid;
  grid-template-columns: 280px 1fr;
}

/* Sidebar */
aside {
  border-right: 1px solid var(--line);
  overflow-y: auto;
  background: var(--bg);
}
aside::-webkit-scrollbar { width: 6px; }
aside::-webkit-scrollbar-track { background: transparent; }
aside::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

.brand {
  font-family: var(--serif);
  font-style: italic;
  font-size: 30px;
  font-weight: 400;
  letter-spacing: -0.01em;
  padding: 36px 28px 24px;
  line-height: 1;
}
.brand .dot { color: var(--fg-faint); }

.category { border-top: 1px solid var(--line-soft); }
.category:last-child { border-bottom: 1px solid var(--line-soft); }

.category-header {
  padding: 13px 28px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  user-select: none;
  transition: color 0.2s, background 0.2s;
  font-size: 12.5px;
  font-weight: 400;
}
.category-header:hover { color: var(--fg-muted); }
.category-header .arrow {
  font-family: var(--serif);
  font-style: italic;
  color: var(--fg-faint);
  font-size: 14px;
  transition: transform 0.25s ease;
  display: inline-block;
}
.category.open .arrow { transform: rotate(90deg); }

.items { display: none; padding: 4px 0 14px; }
.category.open .items { display: block; }

.item {
  display: grid;
  grid-template-columns: 24px 1fr auto;
  grid-template-areas:
    "icon label ratio"
    ".    note  note";
  gap: 0 10px;
  align-items: center;
  padding: 7px 28px 7px 22px;
  cursor: pointer;
  transition: color 0.15s, background 0.15s, box-shadow 0.15s;
  position: relative;
}
.item:hover { background: var(--bg-soft); }
.item.active { box-shadow: inset 2px 0 0 var(--fg); }

.item-icon-slot {
  grid-area: icon;
  width: 24px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  overflow: hidden;
}
.item-icon {
  height: 14px;
  width: auto;
  max-width: 24px;
  object-fit: contain;
  display: block;
  opacity: 0.85;
}

.item-label {
  grid-area: label;
  font-size: 12px;
  line-height: 1.35;
}
.item-ratio {
  grid-area: ratio;
  font-family: var(--serif);
  font-style: italic;
  color: var(--fg-faint);
  font-size: 13px;
  white-space: nowrap;
  font-weight: 400;
}
.item.active .item-ratio { color: var(--fg-muted); }
.item-note {
  grid-area: note;
  font-size: 9.5px;
  color: var(--fg-faint);
  letter-spacing: 0;
  margin-top: 2px;
  line-height: 1.3;
}

/* Main */
main {
  display: grid;
  grid-template-rows: auto 1fr auto;
  overflow: hidden;
  min-width: 0;
}

header.info {
  padding: 32px 44px 8px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 24px;
  flex-wrap: wrap;
}
.ratio-label {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 400;
  font-style: italic;
  letter-spacing: -0.01em;
  line-height: 1;
}
.ratio-label .colon { margin: 0 6px; color: var(--fg-faint); font-style: normal; }
.ratio-label .name {
  font-family: var(--sans);
  font-style: normal;
  font-size: 12px;
  color: var(--fg-muted);
  letter-spacing: 0.04em;
  display: block;
  margin-top: 6px;
  font-weight: 400;
}
.size-hint {
  font-size: 15px;
  color: var(--fg-muted);
  font-family: var(--serif);
  font-style: italic;
  text-align: right;
}
.size-hint .px { color: var(--fg-faint); font-size: 11px; margin-left: 3px; }

.canvas-wrap {
  position: relative;
  margin: 20px 44px;
  overflow: hidden;
  min-height: 0;
}
#previewImg {
  position: absolute;
  display: none;
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: none;
}
#previewImg.shown { display: block; }
#canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  touch-action: none;
  cursor: grab;
}
#canvas.dragging { cursor: grabbing; }
#canvas.empty { cursor: default; }

.empty-msg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 8px;
  color: var(--fg-faint);
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  pointer-events: none;
}
.empty-msg.hidden { display: none; }
.empty-msg .sub {
  font-family: var(--sans);
  font-style: normal;
  font-size: 11px;
  letter-spacing: 0.05em;
}

footer.controls {
  padding: 20px 44px 28px;
  display: flex;
  align-items: center;
  gap: 28px;
  border-top: 1px solid var(--line-soft);
  flex-wrap: wrap;
}

.btn {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  background: none;
  border: 1px solid var(--fg);
  color: var(--fg);
  padding: 10px 22px;
  cursor: pointer;
  transition: all 0.2s ease;
  border-radius: 0;
  white-space: nowrap;
}
.btn:hover:not(:disabled) { background: var(--fg); color: var(--bg); }
.btn:disabled {
  border-color: var(--fg-faint);
  color: var(--fg-faint);
  cursor: not-allowed;
}
.btn .fmt {
  font-family: var(--serif);
  font-style: italic;
  font-size: 13px;
  letter-spacing: 0;
  text-transform: lowercase;
  margin-left: 6px;
  opacity: 0.7;
}

.split-controls {
  display: flex;
  gap: 28px;
  align-items: center;
  margin-left: auto;
}
.split-controls label {
  display: flex;
  align-items: baseline;
  gap: 10px;
  font-size: 11px;
  color: var(--fg-muted);
  letter-spacing: 0.06em;
}
.split-controls input {
  width: 52px;
  padding: 6px 4px;
  border: none;
  border-bottom: 1px solid var(--line);
  background: transparent;
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  font-weight: 500;
  text-align: center;
  color: var(--fg);
  transition: border-color 0.2s;
}
.split-controls input:focus {
  outline: none;
  border-bottom-color: var(--fg);
}
.split-controls input::-webkit-outer-spin-button,
.split-controls input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
.split-controls input[type=number] { -moz-appearance: textfield; }

@media (max-width: 760px) {
  body { grid-template-columns: 1fr; grid-template-rows: 220px 1fr; }
  aside { border-right: none; border-bottom: 1px solid var(--line); }
  .brand { padding: 18px 22px 14px; font-size: 24px; }
  header.info { padding: 18px 22px 4px; flex-direction: column; align-items: flex-start; gap: 6px; }
  .size-hint { text-align: left; }
  .canvas-wrap { margin: 14px 22px; }
  footer.controls { padding: 16px 22px 22px; gap: 18px; }
  .split-controls { margin-left: 0; gap: 18px; }
}
</style>
</head>
<body>

<aside>
  <div class="brand">aspect<span class="dot">.</span></div>
  <nav id="categories"></nav>
</aside>

<main>
  <header class="info">
    <div class="ratio-label" id="ratioLabel">
      <span id="ratioText">—<span class="colon">:</span>—</span>
      <span class="name" id="ratioName">比率を選択してください</span>
    </div>
    <div class="size-hint" id="sizeHint"></div>
  </header>

  <div class="canvas-wrap" id="canvasWrap">
    <img id="previewImg" alt="">
    <canvas id="canvas" class="empty"></canvas>
    <div class="empty-msg" id="emptyMsg">
      <span>no image</span>
      <span class="sub">左から比率を選び、画像 / GIF を読み込んでください</span>
    </div>
  </div>

  <footer class="controls">
    <input type="file" id="file" accept="image/*,.gif" hidden>
    <label for="file" class="btn">画像 / GIF</label>
    <button id="save" class="btn" disabled>保存</button>
    <div class="split-controls">
      <label>横 <input type="number" id="splitW" min="1" value="1"></label>
      <label>縦 <input type="number" id="splitH" min="1" value="1"></label>
    </div>
  </footer>
</main>

    { name: 'カプセルマシーン', w: 171, h: 188 },
    { name: 'マフラータオル', w: 1099, h: 239 },
    { name: 'クリアポーチ', w: 23, h: 32, note: '※表面に貼り付けたような感じになる' },
    { name: '飾り皿', w: 441, h: 436 },
  ]},
  { name: '文房具', items: [
    { name: '張り紙', w: 87, h: 154 },
  ]},
  { name: 'スポーツ', items: [
    { name: 'バスケゴール', w: 331, h: 206 },
    { name: 'スケートボード', w: 21243, h: 82330 },
  ]},
  { name: 'ドリンク', items: [
    { name: '350ml缶', w: 66, h: 113, note: '※ラベル位置がズレている' },
    { name: '500ml缶', w: 66, h: 157, note: '※ラベル位置がズレている' },
    { name: 'PETボトル', w: 1, h: 1 },
    { name: 'サイダー瓶', w: 47, h: 91 },
    { name: '瓶ビール', w: 61, h: 91 },
    { name: 'ワインボトル', w: 74, h: 81 },
    { name: 'シャンパンボトル', w: 85, h: 64 },
    { name: '日本酒四合瓶', w: 5, h: 8 },
    { name: '日本酒一升瓶', w: 5, h: 8 },
    { name: 'ウィスキーボトル', w: 55, h: 41 },
  ]},
];

/* ===== State ===== */
const state = {
  ratio: null,
  fileType: null,      // 'image' | 'gif'
  naturalW: 0, naturalH: 0,
  gifBuffer: null,
  gifDecoded: null,
  imgUrl: null,
  splitW: 1, splitH: 1,
  canvasW: 0, canvasH: 0,
  imgX: 0, imgY: 0, imgW: 0, imgH: 0,
  frameX: 0, frameY: 0, frameW: 0, frameH: 0,
  dragging: false, dragOffX: 0, dragOffY: 0,
  activeItemEl: null,
  loaded: false,
  _gifWorkerUrl: null,
};

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');
const previewImg = document.getElementById('previewImg');
const emptyMsg = document.getElementById('emptyMsg');
const ratioText = document.getElementById('ratioText');
const ratioName = document.getElementById('ratioName');
const sizeHint = document.getElementById('sizeHint');
const saveBtn = document.getElementById('save');
const fileInput = document.getElementById('file');
const splitWInput = document.getElementById('splitW');
const splitHInput = document.getElementById('splitH');

/* ===== Sidebar ===== */
function renderSidebar() {
  const root = document.getElementById('categories');
  CATEGORIES.forEach((cat) => {
    const wrap = document.createElement('div');
    wrap.className = 'category';
    const header = document.createElement('div');
    header.className = 'category-header';
    header.innerHTML = `<span>${cat.name}</span><span class="arrow">›</span>`;
    header.addEventListener('click', () => wrap.classList.toggle('open'));
    const items = document.createElement('div');
    items.className = 'items';
    cat.items.forEach(it => {
      const el = document.createElement('div');
      el.className = 'item';
      const iconHtml = it.icon
        ? `<span class="item-icon-slot"><img class="item-icon" src="${it.icon}" alt=""></span>`
        : `<span class="item-icon-slot"></span>`;
      const noteHtml = it.note ? `<span class="item-note">${it.note}</span>` : '';
      el.innerHTML = `
        ${iconHtml}
        <span class="item-label">${it.name}</span>
        <span class="item-ratio">${it.w} : ${it.h}</span>
        ${noteHtml}
      `;
      el.addEventListener('click', () => selectItem(it, el));
      items.appendChild(el);
    });
    wrap.appendChild(header);
    wrap.appendChild(items);
    root.appendChild(wrap);
  });
}

function selectItem(item, el) {
  state.ratio = item;
  if (state.activeItemEl) state.activeItemEl.classList.remove('active');
  el.classList.add('active');
  state.activeItemEl = el;

  ratioText.innerHTML = `${item.w}<span class="colon">:</span>${item.h}`;
  ratioName.textContent = item.name;
  recalculateFrame();
  updatePreviewImg();
  draw();
  updateSizeHint();
  updateSaveBtn();
}

/* ===== Layout ===== */
function resizeCanvas() {
  const cw = wrap.clientWidth;
  const ch = wrap.clientHeight;
  if (cw <= 0 || ch <= 0) return;
  const dpr = window.devicePixelRatio || 1;
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  canvas.width = Math.floor(cw * dpr);
  canvas.height = Math.floor(ch * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  state.canvasW = cw;
  state.canvasH = ch;
  recalculateImageLayout();
  recalculateFrame();
  updatePreviewImg();
  draw();
  updateSizeHint();
}

function recalculateImageLayout() {
  if (!state.loaded) return;
  const cw = state.canvasW, ch = state.canvasH;
  const r = state.naturalW / state.naturalH;
  let dw = cw, dh = cw / r;
  if (dh > ch) { dh = ch; dw = ch * r; }
  state.imgW = dw; state.imgH = dh;
  state.imgX = (cw - dw) / 2;
  state.imgY = (ch - dh) / 2;
}

function getEffectiveRatio() {
  if (!state.ratio) return 1;
  return (state.ratio.w * state.splitW) / (state.ratio.h * state.splitH);
}

function recalculateFrame() {
  if (!state.loaded || !state.ratio) return;
  const target = getEffectiveRatio();
  let fw = state.imgW, fh = fw / target;
  if (fh > state.imgH) { fh = state.imgH; fw = fh * target; }
  state.frameW = fw;
  state.frameH = fh;
  state.frameX = state.imgX + (state.imgW - fw) / 2;
  state.frameY = state.imgY + (state.imgH - fh) / 2;
}

function updatePreviewImg() {
  if (!state.loaded) {
    previewImg.classList.remove('shown');
    return;
  }
  previewImg.style.left = state.imgX + 'px';
  previewImg.style.top = state.imgY + 'px';
  previewImg.style.width = state.imgW + 'px';
  previewImg.style.height = state.imgH + 'px';
  previewImg.classList.add('shown');
}

/* ===== Draw mask + frame ===== */
function draw() {
  ctx.clearRect(0, 0, state.canvasW, state.canvasH);
  if (!state.loaded || !state.ratio) return;

  // Dark mask outside frame (only over image area)
  ctx.fillStyle = 'rgba(20, 20, 20, 0.5)';
  if (state.frameY > state.imgY)
    ctx.fillRect(state.imgX, state.imgY, state.imgW, state.frameY - state.imgY);
  const fBottom = state.frameY + state.frameH;
  const iBottom = state.imgY + state.imgH;
  if (fBottom < iBottom)
    ctx.fillRect(state.imgX, fBottom, state.imgW, iBottom - fBottom);
  if (state.frameX > state.imgX)
    ctx.fillRect(state.imgX, state.frameY, state.frameX - state.imgX, state.frameH);
  const fRight = state.frameX + state.frameW;
  const iRight = state.imgX + state.imgW;
  if (fRight < iRight)
    ctx.fillRect(fRight, state.frameY, iRight - fRight, state.frameH);

  // Frame border
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(state.frameX + 0.5, state.frameY + 0.5, state.frameW - 1, state.frameH - 1);

  // Split dotted lines
  if (state.splitW > 1 || state.splitH > 1) {
    ctx.save();
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)';
    ctx.lineWidth = 1;
    for (let i = 1; i < state.splitW; i++) {
      const x = state.frameX + (state.frameW * i) / state.splitW;
      ctx.beginPath(); ctx.moveTo(x + 0.5, state.frameY); ctx.lineTo(x + 0.5, state.frameY + state.frameH); ctx.stroke();
    }
    for (let j = 1; j < state.splitH; j++) {
      const y = state.frameY + (state.frameH * j) / state.splitH;
      ctx.beginPath(); ctx.moveTo(state.frameX, y + 0.5); ctx.lineTo(state.frameX + state.frameW, y + 0.5); ctx.stroke();
    }
    ctx.restore();
  }
}

function updateSizeHint() {
  if (!state.ratio) { sizeHint.textContent = ''; return; }
  if (state.loaded) {
    const sx = state.naturalW / state.imgW;
    const sy = state.naturalH / state.imgH;
    const cellW = Math.round((state.frameW / state.splitW) * sx);
    const cellH = Math.round((state.frameH / state.splitH) * sy);
    const totalW = Math.round(state.frameW * sx);
    const totalH = Math.round(state.frameH * sy);
    sizeHint.innerHTML = `1セル ${cellW} × ${cellH} <span class="px">px</span> ／ 全体 ${totalW} × ${totalH} <span class="px">px</span>`;
  } else {
    sizeHint.innerHTML = `${state.ratio.w} : ${state.ratio.h}`;
  }
}

function updateEmpty() {
  if (state.loaded) {
    emptyMsg.classList.add('hidden');
    canvas.classList.remove('empty');
  } else {
    emptyMsg.classList.remove('hidden');
    canvas.classList.add('empty');
  }
}

function updateSaveBtn() {
  const enabled = state.loaded && state.ratio;
  saveBtn.disabled = !enabled;
  if (!enabled) {
    saveBtn.innerHTML = '保存';
    return;
  }
  const total = state.splitW * state.splitH;
  let fmt;
  if (total === 1) fmt = state.fileType === 'gif' ? 'gif' : 'png';
  else fmt = 'zip';
  saveBtn.innerHTML = `保存<span class="fmt">${fmt}</span>`;
}

/* ===== File loading ===== */
fileInput.addEventListener('change', (e) => {
  const f = e.target.files[0];
  if (!f) return;
  loadFile(f);
});

function loadFile(file) {
  const isGif = file.type === 'image/gif' || /\.gif$/i.test(file.name);
  state.fileType = isGif ? 'gif' : 'image';
  state.gifBuffer = null;
  state.gifDecoded = null;

  if (state.imgUrl) URL.revokeObjectURL(state.imgUrl);
  state.imgUrl = URL.createObjectURL(file);

  previewImg.onload = () => {
    state.naturalW = previewImg.naturalWidth;
    state.naturalH = previewImg.naturalHeight;
    state.loaded = true;
    recalculateImageLayout();
    recalculateFrame();
    updateEmpty();
    updatePreviewImg();
    draw();
    updateSizeHint();
    updateSaveBtn();
  };
  previewImg.onerror = () => {
    alert('画像を読み込めませんでした');
  };
  previewImg.src = state.imgUrl;

  // GIF の場合は元データを保持（保存時にフレーム分解する）
  if (isGif) {
    file.arrayBuffer().then(buf => { state.gifBuffer = buf; });
  }
}

/* ===== Drag ===== */
function localPos(e) {
  const r = canvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

canvas.addEventListener('pointerdown', (e) => {
  if (!state.loaded || !state.ratio) return;
  const { x, y } = localPos(e);
  if (x >= state.frameX && x <= state.frameX + state.frameW &&
      y >= state.frameY && y <= state.frameY + state.frameH) {
    state.dragging = true;
    state.dragOffX = x - state.frameX;
    state.dragOffY = y - state.frameY;
    canvas.classList.add('dragging');
    canvas.setPointerCapture(e.pointerId);
  }
});
canvas.addEventListener('pointermove', (e) => {
  if (!state.dragging) return;
  const { x, y } = localPos(e);
  let nx = x - state.dragOffX;
  let ny = y - state.dragOffY;
  nx = Math.max(state.imgX, Math.min(state.imgX + state.imgW - state.frameW, nx));
  ny = Math.max(state.imgY, Math.min(state.imgY + state.imgH - state.frameH, ny));
  state.frameX = nx; state.frameY = ny;
  draw();
});
function endDrag() {
  if (!state.dragging) return;
  state.dragging = false;
  canvas.classList.remove('dragging');
}
canvas.addEventListener('pointerup', endDrag);
canvas.addEventListener('pointercancel', endDrag);

/* ===== Split inputs ===== */
function readSplits() {
  let w = parseInt(splitWInput.value, 10);
  let h = parseInt(splitHInput.value, 10);
  if (!Number.isFinite(w) || w < 1) w = 1;
  if (!Number.isFinite(h) || h < 1) h = 1;
  if (w > 50) w = 50;
  if (h > 50) h = 50;
  splitWInput.value = w;
  splitHInput.value = h;
  state.splitW = w; state.splitH = h;
  recalculateFrame();
  draw();
  updateSizeHint();
  updateSaveBtn();
}
splitWInput.addEventListener('input', readSplits);
splitHInput.addEventListener('input', readSplits);
splitWInput.addEventListener('change', readSplits);
splitHInput.addEventListener('change', readSplits);

/* ===== GIF decode (gifuct-js) → 全フレームを合成済みキャンバスとして保持 ===== */
function decodeGif(arrayBuffer) {
  const parsed = gifuct.parseGIF(arrayBuffer);
  const rawFrames = gifuct.decompressFrames(parsed, true);
  const w = parsed.lsd.width;
  const h = parsed.lsd.height;

  const composite = document.createElement('canvas');
  composite.width = w; composite.height = h;
  const cctx = composite.getContext('2d');

  const out = [];
  let saved = null;
  for (const fr of rawFrames) {
    // 復元用にスナップショット
    if (fr.disposalType === 3) {
      saved = cctx.getImageData(0, 0, w, h);
    }
    // パッチを合成
    const patch = document.createElement('canvas');
    patch.width = fr.dims.width; patch.height = fr.dims.height;
    const pctx = patch.getContext('2d');
    const imgData = pctx.createImageData(fr.dims.width, fr.dims.height);
    imgData.data.set(fr.patch);
    pctx.putImageData(imgData, 0, 0);
    cctx.drawImage(patch, fr.dims.left, fr.dims.top);

    // 現在の合成フレームを保存
    const snap = document.createElement('canvas');
    snap.width = w; snap.height = h;
    snap.getContext('2d').drawImage(composite, 0, 0);
    out.push({ canvas: snap, delay: Math.max(20, fr.delay || 100) });

    // 廃棄処理
    if (fr.disposalType === 2) {
      cctx.clearRect(fr.dims.left, fr.dims.top, fr.dims.width, fr.dims.height);
    } else if (fr.disposalType === 3 && saved) {
      cctx.putImageData(saved, 0, 0);
    }
  }
  return { width: w, height: h, frames: out };
}

async function getGifWorkerUrl() {
  if (state._gifWorkerUrl) return state._gifWorkerUrl;
  const url = 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js';
  const resp = await fetch(url);
  const text = await resp.text();
  state._gifWorkerUrl = URL.createObjectURL(new Blob([text], { type: 'application/javascript' }));
  return state._gifWorkerUrl;
}

function cropGifToBlob(decoded, sx, sy, sw, sh) {
  const w = Math.max(1, Math.round(sw));
  const h = Math.max(1, Math.round(sh));
  return getGifWorkerUrl().then(workerUrl => new Promise((resolve, reject) => {
    const gif = new GIF({
      workers: 2,
      quality: 10,
      workerScript: workerUrl,
      width: w, height: h,
    });
    for (const fr of decoded.frames) {
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(fr.canvas, sx, sy, sw, sh, 0, 0, w, h);
      gif.addFrame(c, { delay: fr.delay, copy: true });
    }
    gif.on('finished', blob => resolve(blob));
    gif.on('abort', () => reject(new Error('aborted')));
    gif.render();
  }));
}

/* ===== Save ===== */
function sanitize(name) {
  return name.replace(/[\/\\?%*:|"<>]/g, '_').trim() || 'aspect';
}
function download(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

async function save() {
  if (!state.loaded || !state.ratio) return;
  const total = state.splitW * state.splitH;
  const isGif = state.fileType === 'gif';
  const baseName = sanitize(state.ratio.name);

  saveBtn.disabled = true;
  const original = saveBtn.innerHTML;

  try {
    // 共通: 各セルのソース座標を計算
    const sxRatio = state.naturalW / state.imgW;
    const syRatio = state.naturalH / state.imgH;
    const cellDispW = state.frameW / state.splitW;
    const cellDispH = state.frameH / state.splitH;
    const cells = [];
    for (let j = 0; j < state.splitH; j++) {
      for (let i = 0; i < state.splitW; i++) {
        cells.push({
          x: (state.frameX + i * cellDispW - state.imgX) * sxRatio,
          y: (state.frameY + j * cellDispH - state.imgY) * syRatio,
          w: cellDispW * sxRatio,
          h: cellDispH * syRatio,
        });
      }
    }

    if (isGif) {
      // GIF を展開（キャッシュあり）
      if (!state.gifDecoded) {
        if (!state.gifBuffer) {
          // 念のため再取得
          const resp = await fetch(state.imgUrl);
          state.gifBuffer = await resp.arrayBuffer();
        }
        saveBtn.innerHTML = 'GIF解析中…';
        state.gifDecoded = decodeGif(state.gifBuffer);
      }
      const decoded = state.gifDecoded;
      const blobs = [];
      for (let k = 0; k < cells.length; k++) {
        saveBtn.innerHTML = `書き出し ${k + 1}/${cells.length}`;
        const c = cells[k];
        const blob = await cropGifToBlob(decoded, c.x, c.y, c.w, c.h);
        blobs.push(blob);
      }
      if (total === 1) {
        download(blobs[0], baseName + '.gif');
      } else {
        saveBtn.innerHTML = 'zip 生成中…';
        const zip = new JSZip();
        const padLen = Math.max(2, String(total).length);
        blobs.forEach((b, i) => zip.file(String(i + 1).padStart(padLen, '0') + '.gif', b));
        const zipBlob = await zip.generateAsync({ type: 'blob' });
        download(zipBlob, baseName + `_${state.splitW}x${state.splitH}.zip`);
      }
    } else {
      // 静止画 → PNG
      const blobs = [];
      for (const c of cells) {
        const off = document.createElement('canvas');
        off.width = Math.max(1, Math.round(c.w));
        off.height = Math.max(1, Math.round(c.h));
        off.getContext('2d').drawImage(previewImg, c.x, c.y, c.w, c.h, 0, 0, off.width, off.height);
        const blob = await new Promise(res => off.toBlob(res, 'image/png'));
        blobs.push(blob);
      }
      if (total === 1) {
        download(blobs[0], baseName + '.png');
      } else {
        const zip = new JSZip();
        const padLen = Math.max(2, String(total).length);
        blobs.forEach((b, i) => zip.file(String(i + 1).padStart(padLen, '0') + '.png', b));
        const zipBlob = await zip.generateAsync({ type: 'blob' });
        download(zipBlob, baseName + `_${state.splitW}x${state.splitH}.zip`);
      }
    }
  } catch (err) {
    console.error(err);
    alert('保存に失敗しました: ' + err.message);
  } finally {
    saveBtn.innerHTML = original;
    updateSaveBtn();
  }
}

saveBtn.addEventListener('click', save);

/* ===== Init ===== */
renderSidebar();
window.addEventListener('resize', resizeCanvas);
new ResizeObserver(resizeCanvas).observe(wrap);
resizeCanvas();
updateEmpty();
updateSaveBtn();
</script>
</body>
</html>
