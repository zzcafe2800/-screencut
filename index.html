<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aspect</title>
<style>
@property --fill { syntax: '<angle>'; initial-value: 0deg; inherits: false; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f8fa;
  --bg-soft: #ebf2f6;
  --fg: #2c3e50;
  --fg-muted: #6e8290;
  --fg-faint: #aabbc4;
  --line: #cfdce4;
  --line-soft: #e2eaee;
  --accent: #5b9cb8;
  --accent-soft: #c4dde8;
  --serif: 'Georgia', 'Hiragino Mincho ProN', 'Yu Mincho', 'MS PMincho', serif;
  --sans: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif;
}

html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--sans);
  font-weight: 400;
  font-size: 13px;
  letter-spacing: 0.02em;
  display: grid;
  grid-template-columns: 280px 1fr;
}

aside { border-right: 1px solid var(--line); overflow-y: auto; background: var(--bg); }
aside::-webkit-scrollbar { width: 6px; }
aside::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

.brand {
  font-family: var(--serif);
  font-style: italic;
  font-size: 30px;
  font-weight: 400;
  padding: 36px 28px 24px;
  line-height: 1;
  color: var(--fg);
}
.brand .dot { color: var(--accent); }

.category { border-top: 1px solid var(--line-soft); }
.category:last-child { border-bottom: 1px solid var(--line-soft); }
.category-header {
  padding: 13px 28px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  user-select: none;
  transition: color 0.2s, background 0.2s;
  font-size: 12.5px;
}
.category-header:hover { color: var(--accent); }
.category-header .arrow {
  font-family: var(--serif);
  font-style: italic;
  color: var(--fg-faint);
  font-size: 14px;
  transition: transform 0.25s ease;
}
.category.open .arrow { transform: rotate(90deg); color: var(--accent); }

.items { display: none; padding: 4px 0 14px; }
.category.open .items { display: block; }

.item {
  display: grid;
  grid-template-columns: 24px 1fr auto;
  grid-template-areas: "icon label ratio" ".    note  note";
  gap: 0 10px;
  align-items: center;
  padding: 7px 28px 7px 22px;
  cursor: pointer;
  transition: background 0.15s, box-shadow 0.15s;
}
.item:hover { background: var(--bg-soft); }
.item.active { box-shadow: inset 2px 0 0 var(--accent); }

.item-icon-slot { grid-area: icon; width: 24px; height: 16px; display: flex; align-items: center; overflow: hidden; }
.item-icon { height: 14px; width: auto; max-width: 24px; object-fit: contain; display: block; opacity: 0.85; }
.item-label { grid-area: label; font-size: 12px; line-height: 1.35; }
.item-ratio { grid-area: ratio; font-family: var(--serif); font-style: italic; color: var(--fg-faint); font-size: 13px; white-space: nowrap; }
.item.active .item-ratio { color: var(--accent); }
.item-note { grid-area: note; font-size: 9.5px; color: var(--fg-faint); margin-top: 2px; line-height: 1.3; }

main {
  display: grid;
  grid-template-rows: auto 1fr auto auto;
  overflow: hidden;
  min-width: 0;
}

header.info {
  padding: 26px 40px 8px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 24px;
  flex-wrap: wrap;
}
.ratio-label { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.name-row { display: flex; align-items: center; gap: 12px; }
.ratio-icon-slot {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ratio-icon-slot:empty { display: none; }
.ratio-icon-slot img { height: 24px; width: auto; max-width: 28px; object-fit: contain; opacity: 0.85; }

.item-big {
  font-size: 24px;
  font-weight: 400;
  color: var(--fg);
  line-height: 1.15;
}
.ratio-small {
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  color: var(--fg-muted);
}
.ratio-small .colon { margin: 0 3px; color: var(--fg-faint); font-style: normal; }

.file-info {
  text-align: right;
  font-family: var(--serif);
  font-style: italic;
  color: var(--fg-muted);
  line-height: 1.5;
  display: flex;
  flex-direction: column;
  gap: 2px;
  align-items: flex-end;
}
.file-info .size { font-size: 14px; color: var(--fg); }
.file-info .dim { font-size: 12px; color: var(--fg-muted); }
.file-info .frames { font-size: 10px; color: var(--fg-faint); letter-spacing: 0.04em; }

.canvas-wrap {
  position: relative;
  margin: 4px 40px;
  overflow: hidden;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
#canvas {
  display: none;
  background: transparent;
  touch-action: none;
}
#canvas.shown { display: block; }
.empty-msg {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--fg-faint);
  font-family: var(--serif); font-style: italic; font-size: 16px;
  pointer-events: none;
}
.empty-msg.hidden { display: none; }

.image-tools {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 16px;
  padding: 8px 0 4px;
}
.tool-btn {
  width: 40px; height: 40px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.6);
  cursor: pointer;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--fg);
  transition: all 0.2s ease;
  padding: 0;
}
.tool-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: rgba(255,255,255,0.9); }
.tool-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.tool-btn svg { display: block; }

.tool-divider { width: 1px; height: 22px; background: var(--line); margin: 0 4px; }

.brightness-btn {
  --fill: 0deg;
  position: relative;
  width: 40px; height: 40px;
  border: none; background: none;
  cursor: pointer; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--fg);
  padding: 0;
  transition: --fill 0.35s ease, color 0.15s;
}
.brightness-btn::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 50%;
  background: conic-gradient(from -90deg, var(--accent) var(--fill), var(--line) 0);
  -webkit-mask: radial-gradient(circle, transparent 14.5px, black 15px, black 19px, transparent 19.5px);
  mask: radial-gradient(circle, transparent 14.5px, black 15px, black 19px, transparent 19.5px);
  pointer-events: none;
}
.brightness-btn:hover:not(:disabled) { color: var(--accent); }
.brightness-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.brightness-btn svg { position: relative; z-index: 1; }

footer.controls {
  padding: 14px 40px 26px;
  display: flex;
  align-items: center;
  gap: 24px;
  border-top: 1px solid var(--line-soft);
  flex-wrap: wrap;
}
.btn {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  background: none;
  border: 1px solid var(--fg);
  color: var(--fg);
  padding: 10px 22px;
  cursor: pointer;
  transition: all 0.2s ease;
  border-radius: 0;
  white-space: nowrap;
}
.btn:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn:disabled { border-color: var(--fg-faint); color: var(--fg-faint); cursor: not-allowed; }
.btn .fmt {
  font-family: var(--serif); font-style: italic;
  font-size: 13px; letter-spacing: 0;
  text-transform: lowercase; margin-left: 6px; opacity: 0.7;
}

.splits { display: flex; gap: 22px; margin-left: auto; align-items: center; }
.split-field { display: flex; align-items: center; gap: 7px; }
.split-field .lbl { font-size: 11px; color: var(--fg-muted); letter-spacing: 0.06em; }
.split-field .num {
  font-family: var(--serif);
  font-style: italic;
  font-size: 22px;
  color: var(--fg);
  min-width: 18px;
  text-align: center;
  line-height: 1;
  user-select: none;
}
.split-field .unit { font-size: 11px; color: var(--fg-faint); }
.arrows { display: flex; flex-direction: column; margin-left: 2px; }
.arr {
  width: 16px; height: 12px;
  background: none; border: none; cursor: pointer;
  color: var(--fg-faint);
  font-size: 8px;
  padding: 0; line-height: 1;
  transition: color 0.15s, transform 0.1s;
  user-select: none;
}
.arr:hover { color: var(--accent); }
.arr:active { transform: scale(0.85); }

@media (max-width: 760px) {
  body { grid-template-columns: 1fr; grid-template-rows: 200px 1fr; }
  aside { border-right: none; border-bottom: 1px solid var(--line); }
  .brand { padding: 16px 22px 12px; font-size: 24px; }
  header.info { padding: 16px 22px 6px; gap: 12px; align-items: flex-start; }
  .item-big { font-size: 20px; }
  .file-info { align-items: flex-start; text-align: left; }
  .canvas-wrap { margin: 4px 22px; }
  footer.controls { padding: 12px 22px 18px; gap: 16px; }
  .splits { margin-left: 0; gap: 18px; }
}
</style>
</head>
<body>

<aside>
  <div class="brand">aspect<span class="dot">.</span></div>
  <nav id="categories"></nav>
</aside>

<main>
  <header class="info">
    <div class="ratio-label">
      <div class="name-row">
        <span class="ratio-icon-slot" id="ratioIconSlot"></span>
        <span class="item-big" id="ratioName">比率を選択</span>
      </div>
      <span class="ratio-small" id="ratioText">—<span class="colon">:</span>—</span>
    </div>
    <div class="file-info">
      <span class="size" id="fileSize">—</span>
      <span class="dim" id="dimLine">— × — px</span>
      <span class="frames" id="framesInfo"></span>
    </div>
  </header>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="canvas"></canvas>
    <div class="empty-msg" id="emptyMsg">画像 / GIF を読み込む</div>
  </div>

  <div class="image-tools">
    <button class="tool-btn" id="flipH" title="左右反転" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7l4 5-4 5z" fill="currentColor"/>
        <path d="M21 7l-4 5 4 5z" fill="currentColor"/>
        <line x1="12" y1="3" x2="12" y2="21" stroke-dasharray="2 2"/>
      </svg>
    </button>
    <button class="tool-btn" id="flipV" title="上下反転" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7 3l5 4 5-4z" fill="currentColor"/>
        <path d="M7 21l5-4 5 4z" fill="currentColor"/>
        <line x1="3" y1="12" x2="21" y2="12" stroke-dasharray="2 2"/>
      </svg>
    </button>
    <button class="tool-btn" id="rotate" title="90°回転" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 1 1-3.5-7.1"/>
        <polyline points="21 4 21 10 15 10"/>
      </svg>
    </button>
    <div class="tool-divider"></div>
    <button class="brightness-btn" id="brightness" title="明るさ" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/>
        <line x1="12" y1="2.5" x2="12" y2="5"/>
        <line x1="12" y1="19" x2="12" y2="21.5"/>
        <line x1="5" y1="5" x2="6.8" y2="6.8"/>
        <line x1="17.2" y1="17.2" x2="19" y2="19"/>
        <line x1="2.5" y1="12" x2="5" y2="12"/>
        <line x1="19" y1="12" x2="21.5" y2="12"/>
        <line x1="5" y1="19" x2="6.8" y2="17.2"/>
        <line x1="17.2" y1="6.8" x2="19" y2="5"/>
      </svg>
    </button>
  </div>

  <footer class="controls">
    <input type="file" id="file" accept="image/*,.gif" hidden>
    <label for="file" class="btn">画像 / GIF</label>
    <button id="save" class="btn" disabled>保存</button>
    <div class="splits">
      <div class="split-field">
        <span class="lbl">横</span>
        <span class="num" id="splitWNum">1</span>
        <span class="unit">枚</span>
        <div class="arrows">
          <button class="arr" data-target="W" data-delta="1">▲</button>
          <button class="arr" data-target="W" data-delta="-1">▼</button>
        </div>
      </div>
      <div class="split-field">
        <span class="lbl">縦</span>
        <span class="num" id="splitHNum">1</span>
        <span class="unit">枚</span>
        <div class="arrows">
          <button class="arr" data-target="H" data-delta="1">▲</button>
          <button class="arr" data-target="H" data-delta="-1">▼</button>
        </div>
      </div>
    </div>
  </footer>
</main>
<script>

// IN THE SOFTWARE.

// omggif is a JavaScript implementation of a GIF 89a encoder and decoder,
// including animation and compression.  It does not rely on any specific
// underlying system, so should run in the browser, Node, or Plask.

"use strict";

function GifWriter(buf, width, height, gopts) {
  var p = 0;

  var gopts = gopts === undefined ? { } : gopts;
  var loop_count = gopts.loop === undefined ? null : gopts.loop;
  var global_palette = gopts.palette === undefined ? null : gopts.palette;

  if (width <= 0 || height <= 0 || width > 65535 || height > 65535)
    throw new Error("Width/Height invalid.");

  function check_palette_and_num_colors(palette) {
    var num_colors = palette.length;
    if (num_colors < 2 || num_colors > 256 ||  num_colors & (num_colors-1)) {
      throw new Error(
          "Invalid code/color length, must be power of 2 and 2 .. 256.");
    }
    return num_colors;
  }

  // - Header.
  buf[p++] = 0x47; buf[p++] = 0x49; buf[p++] = 0x46;  // GIF
  buf[p++] = 0x38; buf[p++] = 0x39; buf[p++] = 0x61;  // 89a

  // Handling of Global Color Table (palette) and background index.
  var gp_num_colors_pow2 = 0;
  var background = 0;
  if (global_palette !== null) {
    var gp_num_colors = check_palette_and_num_colors(global_palette);
    while (gp_num_colors >>= 1) ++gp_num_colors_pow2;
    gp_num_colors = 1 << gp_num_colors_pow2;
    --gp_num_colors_pow2;
    if (gopts.background !== undefined) {
      background = gopts.background;
      if (background >= gp_num_colors)
        throw new Error("Background index out of range.");
      // The GIF spec states that a background index of 0 should be ignored, so
      // this is probably a mistake and you really want to set it to another
      // slot in the palette.  But actually in the end most browsers, etc end
      // up ignoring this almost completely (including for dispose background).
      if (background === 0)
        throw new Error("Background index explicitly passed as 0.");
    }
  }

  // - Logical Screen Descriptor.
  // NOTE(deanm): w/h apparently ignored by implementations, but set anyway.
  buf[p++] = width & 0xff; buf[p++] = width >> 8 & 0xff;
  buf[p++] = height & 0xff; buf[p++] = height >> 8 & 0xff;
  // NOTE: Indicates 0-bpp original color resolution (unused?).
  buf[p++] = (global_palette !== null ? 0x80 : 0) |  // Global Color Table Flag.
             gp_num_colors_pow2;  // NOTE: No sort flag (unused?).
  buf[p++] = background;  // Background Color Index.
  buf[p++] = 0;  // Pixel aspect ratio (unused?).

  // - Global Color Table
  if (global_palette !== null) {
    for (var i = 0, il = global_palette.length; i < il; ++i) {
      var rgb = global_palette[i];
      buf[p++] = rgb >> 16 & 0xff;
      buf[p++] = rgb >> 8 & 0xff;
      buf[p++] = rgb & 0xff;
    }
  }

  if (loop_count !== null) {  // Netscape block for looping.
    if (loop_count < 0 || loop_count > 65535)
      throw new Error("Loop count invalid.")
    // Extension code, label, and length.
    buf[p++] = 0x21; buf[p++] = 0xff; buf[p++] = 0x0b;
    // NETSCAPE2.0
    buf[p++] = 0x4e; buf[p++] = 0x45; buf[p++] = 0x54; buf[p++] = 0x53;
    buf[p++] = 0x43; buf[p++] = 0x41; buf[p++] = 0x50; buf[p++] = 0x45;
    buf[p++] = 0x32; buf[p++] = 0x2e; buf[p++] = 0x30;
    // Sub-block
    buf[p++] = 0x03; buf[p++] = 0x01;
    buf[p++] = loop_count & 0xff; buf[p++] = loop_count >> 8 & 0xff;
    buf[p++] = 0x00;  // Terminator.
  }


  var ended = false;

  this.addFrame = function(x, y, w, h, indexed_pixels, opts) {
    if (ended === true) { --p; ended = false; }  // Un-end.

    opts = opts === undefined ? { } : opts;

    // TODO(deanm): Bounds check x, y.  Do they need to be within the virtual
    // canvas width/height, I imagine?
    if (x < 0 || y < 0 || x > 65535 || y > 65535)
      throw new Error("x/y invalid.")

    if (w <= 0 || h <= 0 || w > 65535 || h > 65535)
      throw new Error("Width/Height invalid.")

    if (indexed_pixels.length < w * h)
      throw new Error("Not enough pixels for the frame size.");

    var using_local_palette = true;
    var palette = opts.palette;
    if (palette === undefined || palette === null) {
      using_local_palette = false;
      palette = global_palette;
    }

    if (palette === undefined || palette === null)
      throw new Error("Must supply either a local or global palette.");

    var num_colors = check_palette_and_num_colors(palette);

    // Compute the min_code_size (power of 2), destroying num_colors.
    var min_code_size = 0;
    while (num_colors >>= 1) ++min_code_size;
    num_colors = 1 << min_code_size;  // Now we can easily get it back.

    var delay = opts.delay === undefined ? 0 : opts.delay;

    // From the spec:
    //     0 -   No disposal specified. The decoder is
    //           not required to take any action.
    //     1 -   Do not dispose. The graphic is to be left
    //           in place.
    //     2 -   Restore to background color. The area used by the
    //           graphic must be restored to the background color.
    //     3 -   Restore to previous. The decoder is required to
    //           restore the area overwritten by the graphic with
    //           what was there prior to rendering the graphic.
    //  4-7 -    To be defined.
    // NOTE(deanm): Dispose background doesn't really work, apparently most
    // browsers ignore the background palette index and clear to transparency.
    var disposal = opts.disposal === undefined ? 0 : opts.disposal;
    if (disposal < 0 || disposal > 3)  // 4-7 is reserved.
      throw new Error("Disposal out of range.");

    var use_transparency = false;
    var transparent_index = 0;
    if (opts.transparent !== undefined && opts.transparent !== null) {
      use_transparency = true;
      transparent_index = opts.transparent;
      if (transparent_index < 0 || transparent_index >= num_colors)
        throw new Error("Transparent color index.");
    }

    if (disposal !== 0 || use_transparency || delay !== 0) {
      // - Graphics Control Extension
      buf[p++] = 0x21; buf[p++] = 0xf9;  // Extension / Label.
      buf[p++] = 4;  // Byte size.

      buf[p++] = disposal << 2 | (use_transparency === true ? 1 : 0);
      buf[p++] = delay & 0xff; buf[p++] = delay >> 8 & 0xff;
      buf[p++] = transparent_index;  // Transparent color index.
      buf[p++] = 0;  // Block Terminator.
    }

    // - Image Descriptor
    buf[p++] = 0x2c;  // Image Seperator.
    buf[p++] = x & 0xff; buf[p++] = x >> 8 & 0xff;  // Left.
    buf[p++] = y & 0xff; buf[p++] = y >> 8 & 0xff;  // Top.
    buf[p++] = w & 0xff; buf[p++] = w >> 8 & 0xff;
    buf[p++] = h & 0xff; buf[p++] = h >> 8 & 0xff;
    // NOTE: No sort flag (unused?).
    // TODO(deanm): Support interlace.
    buf[p++] = using_local_palette === true ? (0x80 | (min_code_size-1)) : 0;

    // - Local Color Table
    if (using_local_palette === true) {
      for (var i = 0, il = palette.length; i < il; ++i) {
        var rgb = palette[i];
        buf[p++] = rgb >> 16 & 0xff;
        buf[p++] = rgb >> 8 & 0xff;
        buf[p++] = rgb & 0xff;
      }
    }

    p = GifWriterOutputLZWCodeStream(
            buf, p, min_code_size < 2 ? 2 : min_code_size, indexed_pixels);

    return p;
  };

  this.end = function() {
    if (ended === false) {
      buf[p++] = 0x3b;  // Trailer.
      ended = true;
    }
    return p;
  };

  this.getOutputBuffer = function() { return buf; };
  this.setOutputBuffer = function(v) { buf = v; };
  this.getOutputBufferPosition = function() { return p; };
  this.setOutputBufferPosition = function(v) { p = v; };
}

const BRIGHTNESS_STEP = 0.08;
const BRIGHTNESS_MAX = 5;

/* ===== State ===== */
const state = {
  ratio: null,
  fileType: null,        // 'image' | 'gif'
  fileSize: 0,
  naturalW: 0, naturalH: 0,
  frames: [],            // [{ canvas, delay }] — 全てのGIFフレームを画像canvasとして保持
  currentFrame: 0,
  rotation: 0, flipH: false, flipV: false,
  brightness: 0,
  splitW: 1, splitH: 1,
  canvasW: 0, canvasH: 0,
  frameX: 0, frameY: 0, frameW: 0, frameH: 0,
  dragging: false, dragOffX: 0, dragOffY: 0,
  resizing: false, resizeAnchorX: 0, resizeAnchorY: 0,
  activeItemEl: null,
  loaded: false,
  _rafId: null,
  _lastTick: 0,
};

const HANDLE_R = 7;
const HANDLE_HIT_R = 14;
const MIN_FRAME = 24;

const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');

const splitHNum = document.getElementById('splitHNum');

const flipVBtn = document.getElementById('flipV');

/* ===== Sidebar ===== */
function renderSidebar() {

    h.addEventListener('click', () => w.classList.toggle('open'));
    const items = document.createElement('div');
    items.className = 'items';
    cat.items.forEach(it => {
      const el = document.createElement('div');
      el.className = 'item';
      const ic = it.icon
        ? `<span class="item-icon-slot"><img class="item-icon" src="${it.icon}" alt=""></span>`
        : `<span class="item-icon-slot"></span>`;

      el.innerHTML = `${ic}<span class="item-label">${it.name}</span><span class="item-ratio">${it.w} : ${it.h}</span>${nt}`;
      el.addEventListener('click', () => selectItem(it, el));

}

function selectItem(item, el) {
  state.ratio = item;
  if (state.activeItemEl) state.activeItemEl.classList.remove('active');
  el.classList.add('active');
  state.activeItemEl = el;
  ratioText.innerHTML = `${item.w}<span class="colon">:</span>${item.h}`;
  ratioName.textContent = item.name;
  ratioIconSlot.innerHTML = item.icon ? `<img src="${item.icon}" alt="">` : '';
  recalculateFrame();
  draw();
  updateDimLine();
  updateSaveBtn();
}

/* ===== Decode GIF to frame array using omggif ===== */
function decodeGifToFrames(arrayBuffer) {
  const bytes = new Uint8Array(arrayBuffer);
  const reader = new GifReader(bytes);
  const W = reader.width;
  const H = reader.height;
  const numFrames = reader.numFrames();
  const composite = document.createElement('canvas');
  composite.width = W; composite.height = H;
  const cctx = composite.getContext('2d');
  // Fill background with transparent
  cctx.clearRect(0, 0, W, H);
  const out = [];
  let prev = null;
  for (let i = 0; i < numFrames; i++) {
    const info = reader.frameInfo(i);
    // Save before drawing if disposal=3 (revert)
    if (info.disposal === 3) prev = cctx.getImageData(0, 0, W, H);
    const px = new Uint8ClampedArray(info.width * info.height * 4);
    reader.decodeAndBlitFrameRGBA(i, px);
    const imgData = new ImageData(px, info.width, info.height);
    // Put into a temp canvas at frame position
    const patch = document.createElement('canvas');
    patch.width = info.width; patch.height = info.height;
    patch.getContext('2d').putImageData(imgData, 0, 0);
    cctx.drawImage(patch, info.x, info.y);
    // Snapshot composited frame
    const snap = document.createElement('canvas');
    snap.width = W; snap.height = H;
    snap.getContext('2d').drawImage(composite, 0, 0);
    out.push({ canvas: snap, delay: Math.max(20, (info.delay || 10) * 10) });
    // Apply disposal
    if (info.disposal === 2) {
      cctx.clearRect(info.x, info.y, info.width, info.height);
    } else if (info.disposal === 3 && prev) {
      cctx.putImageData(prev, 0, 0);
    }
  }
  return { width: W, height: H, frames: out };
}

/* ===== Load file ===== */
fileInput.addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) loadFile(f);
});

async function loadFile(file) {
  const isGif = file.type === 'image/gif' || /\.gif$/i.test(file.name);
  state.fileType = isGif ? 'gif' : 'image';
  state.fileSize = file.size;
  state.loaded = false;
  state.rotation = 0;
  state.flipH = false;
  state.flipV = false;
  state.brightness = 0;
  state.currentFrame = 0;
  state.frames = [];
  stopAnimation();
  updateBrightnessGauge();
  canvas.classList.remove('shown');
  updateEmpty();
  updateFileSize();
  updateFramesInfo();

  try {
    if (isGif) {
      const buf = await file.arrayBuffer();
      const decoded = decodeGifToFrames(buf);
      state.naturalW = decoded.width;
      state.naturalH = decoded.height;
      state.frames = decoded.frames;
    } else {
      const url = URL.createObjectURL(file);
      const img = await new Promise((res, rej) => {
        const i = new Image();
        i.onload = () => res(i);
        i.onerror = rej;
        i.src = url;
      });
      const c = document.createElement('canvas');
      c.width = img.naturalWidth;
      c.height = img.naturalHeight;
      c.getContext('2d').drawImage(img, 0, 0);
      URL.revokeObjectURL(url);
      state.naturalW = img.naturalWidth;
      state.naturalH = img.naturalHeight;
      state.frames = [{ canvas: c, delay: 0 }];
    }
    state.loaded = true;
    updateFileSize();
    updateFramesInfo();
    updateEmpty();
    updateToolBtns();
    recomputeLayout();
    updateSaveBtn();
    if (state.frames.length > 1) startAnimation();
  } catch (err) {
    console.error(err);
    alert('ファイルを読み込めませんでした: ' + err.message);
  }
}

/* ===== Layout ===== */
function recomputeLayout() {
  if (!state.loaded) {
    canvas.classList.remove('shown');
    return;
  }
  const cw = wrap.clientWidth, ch = wrap.clientHeight;
  if (cw <= 0 || ch <= 0) return;
  const isRot90 = state.rotation === 90 || state.rotation === 270;
  const effW = isRot90 ? state.naturalH : state.naturalW;
  const effH = isRot90 ? state.naturalW : state.naturalH;
  const r = effW / effH;
  let dw = cw, dh = cw / r;
  if (dh > ch) { dh = ch; dw = ch * r; }
  state.canvasW = dw;
  state.canvasH = dh;
  const dpr = window.devicePixelRatio || 1;
  canvas.style.width = dw + 'px';
  canvas.style.height = dh + 'px';
  canvas.width = Math.floor(dw * dpr);
  canvas.height = Math.floor(dh * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  canvas.classList.add('shown');
  recalculateFrame();
  draw();
  updateDimLine();
}

function getEffectiveRatio() {
  if (!state.ratio) return 1;
  return (state.ratio.w * state.splitW) / (state.ratio.h * state.splitH);
}

function recalculateFrame() {
  if (!state.loaded || !state.ratio) return;
  const t = getEffectiveRatio();
  let fw = state.canvasW, fh = fw / t;
  if (fh > state.canvasH) { fh = state.canvasH; fw = fh * t; }
  state.frameW = fw; state.frameH = fh;
  state.frameX = (state.canvasW - fw) / 2;
  state.frameY = (state.canvasH - fh) / 2;
}

/* ===== Draw — source frame + overlay all on one canvas ===== */
function draw() {
  if (!state.canvasW || !state.canvasH) return;
  ctx.clearRect(0, 0, state.canvasW, state.canvasH);
  if (!state.loaded || state.frames.length === 0) return;

  const frame = state.frames[state.currentFrame];
  if (!frame) return;

  // Draw current source frame with rotation/flip/brightness applied
  ctx.save();
  if (state.brightness > 0) {
    ctx.filter = `brightness(${1 + state.brightness * BRIGHTNESS_STEP})`;
  }
  ctx.translate(state.canvasW / 2, state.canvasH / 2);
  ctx.rotate(state.rotation * Math.PI / 180);
  ctx.scale(state.flipH ? -1 : 1, state.flipV ? -1 : 1);
  const isRot90 = state.rotation === 90 || state.rotation === 270;
  const drawW = isRot90 ? state.canvasH : state.canvasW;
  const drawH = isRot90 ? state.canvasW : state.canvasH;
  ctx.drawImage(frame.canvas, -drawW / 2, -drawH / 2, drawW, drawH);
  ctx.restore();

  if (!state.ratio) return;

  // Dark mask outside frame
  ctx.fillStyle = 'rgba(20,30,40,0.45)';
  if (state.frameY > 0) ctx.fillRect(0, 0, state.canvasW, state.frameY);
  const fB = state.frameY + state.frameH;
  if (fB < state.canvasH) ctx.fillRect(0, fB, state.canvasW, state.canvasH - fB);
  if (state.frameX > 0) ctx.fillRect(0, state.frameY, state.frameX, state.frameH);
  const fR = state.frameX + state.frameW;
  if (fR < state.canvasW) ctx.fillRect(fR, state.frameY, state.canvasW - fR, state.frameH);

  // Frame border
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(state.frameX + 0.5, state.frameY + 0.5, state.frameW - 1, state.frameH - 1);

  // Split lines
  if (state.splitW > 1 || state.splitH > 1) {
    ctx.save();
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.lineWidth = 1;
    for (let i = 1; i < state.splitW; i++) {
      const x = state.frameX + (state.frameW * i) / state.splitW;
      ctx.beginPath(); ctx.moveTo(x + 0.5, state.frameY); ctx.lineTo(x + 0.5, state.frameY + state.frameH); ctx.stroke();
    }
    for (let j = 1; j < state.splitH; j++) {
      const y = state.frameY + (state.frameH * j) / state.splitH;
      ctx.beginPath(); ctx.moveTo(state.frameX, y + 0.5); ctx.lineTo(state.frameX + state.frameW, y + 0.5); ctx.stroke();
    }
    ctx.restore();
  }

  // Resize handle (top-right)
  const hx = state.frameX + state.frameW;
  const hy = state.frameY;
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.arc(hx, hy, HANDLE_R + 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(hx, hy, HANDLE_R, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.arc(hx, hy, HANDLE_R, 0, Math.PI * 2); ctx.stroke();
}

/* ===== Animation loop for multi-frame ===== */
function animationLoop(now) {
  if (!state.loaded || state.frames.length <= 1) { state._rafId = null; return; }
  const delay = state.frames[state.currentFrame].delay;
  if (now - state._lastTick >= delay) {
    state.currentFrame = (state.currentFrame + 1) % state.frames.length;
    state._lastTick = now;
    draw();
  }
  state._rafId = requestAnimationFrame(animationLoop);
}
function startAnimation() {
  if (state._rafId) return;
  state._lastTick = performance.now();
  state._rafId = requestAnimationFrame(animationLoop);
}
function stopAnimation() {
  if (state._rafId) { cancelAnimationFrame(state._rafId); state._rafId = null; }
}

/* ===== Info ===== */
function formatBytes(b) {
  if (b == null) return '—';
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1024 / 1024).toFixed(2) + ' MB';
}
function updateFileSize() {
  fileSizeEl.textContent = state.loaded ? formatBytes(state.fileSize) : '—';
}
function updateFramesInfo() {
  if (!state.loaded) { framesInfo.textContent = ''; return; }
  framesInfo.textContent = state.frames.length > 1 ? `${state.frames.length} frames` : '';
}
function updateDimLine() {
  if (!state.ratio || !state.loaded) {
    dimLine.textContent = '— × — px';
    return;
  }
  const isRot90 = state.rotation === 90 || state.rotation === 270;
  const effW = isRot90 ? state.naturalH : state.naturalW;
  const effH = isRot90 ? state.naturalW : state.naturalH;
  const sx = effW / state.canvasW;
  const sy = effH / state.canvasH;
  const tw = Math.round(state.frameW * sx);
  const th = Math.round(state.frameH * sy);
  dimLine.textContent = `${tw} × ${th} px`;
}
function updateEmpty() { emptyMsg.classList.toggle('hidden', state.loaded); }
function updateSaveBtn() {
  const enabled = state.loaded && state.ratio;
  saveBtn.disabled = !enabled;
  if (!enabled) { saveBtn.innerHTML = '保存'; return; }
  const total = state.splitW * state.splitH;
  const fmt = total === 1 ? (state.fileType === 'gif' ? 'gif' : 'png') : 'zip';
  saveBtn.innerHTML = `保存<span class="fmt">${fmt}</span>`;
}
function updateToolBtns() {
  const en = state.loaded;
  [flipHBtn, flipVBtn, rotateBtn, brightnessBtn].forEach(b => b.disabled = !en);
}
function updateBrightnessGauge() {
  const fill = (state.brightness / BRIGHTNESS_MAX) * 360;
  brightnessBtn.style.setProperty('--fill', fill + 'deg');
}

/* ===== Pointer ===== */
function localPos(e) {
  const r = canvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}
function isOnHandle(x, y) {
  const hx = state.frameX + state.frameW;
