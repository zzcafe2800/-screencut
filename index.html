<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f4f1ea;
  --bg-soft: #ede9df;
  --fg: #1a1a1a;
  --fg-muted: #7a766d;
  --fg-faint: #b8b3a6;
  --line: #d9d3c5;
  --line-soft: #e6e1d4;
  --serif: 'Cormorant Garamond', 'Noto Serif JP', serif;
  --sans: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
}

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--sans);
  font-weight: 300;
  font-size: 13px;
  letter-spacing: 0.02em;
  display: grid;
  grid-template-columns: 260px 1fr;
}

/* Sidebar */
aside {
  border-right: 1px solid var(--line);
  overflow-y: auto;
  background: var(--bg);
}
aside::-webkit-scrollbar { width: 6px; }
aside::-webkit-scrollbar-track { background: transparent; }
aside::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

.brand {
  font-family: var(--serif);
  font-style: italic;
  font-size: 30px;
  font-weight: 400;
  letter-spacing: -0.01em;
  padding: 36px 28px 24px;
  line-height: 1;
}
.brand .dot { color: var(--fg-faint); }

.category { border-top: 1px solid var(--line-soft); }
.category:last-child { border-bottom: 1px solid var(--line-soft); }

.category-header {
  padding: 13px 28px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  user-select: none;
  transition: color 0.2s, background 0.2s;
  font-size: 12.5px;
  font-weight: 400;
}
.category-header:hover { color: var(--fg-muted); }
.category-header .arrow {
  font-family: var(--serif);
  font-style: italic;
  color: var(--fg-faint);
  font-size: 14px;
  transition: transform 0.25s ease;
  display: inline-block;
}
.category.open .arrow { transform: rotate(90deg); }

.items { display: none; padding: 4px 0 14px; }
.category.open .items { display: block; }

.item {
  padding: 7px 28px 7px 36px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  gap: 14px;
  align-items: baseline;
  transition: color 0.15s, background 0.15s;
  position: relative;
}
.item:hover { background: var(--bg-soft); }
.item.active::before {
  content: '';
  position: absolute;
  left: 24px; top: 50%;
  width: 4px; height: 4px;
  background: var(--fg);
  border-radius: 50%;
  transform: translateY(-50%);
}
.item.active { color: var(--fg); }

.item-name {
  flex: 1;
  font-size: 12px;
  line-height: 1.35;
}
.item-note {
  display: block;
  font-size: 9.5px;
  color: var(--fg-faint);
  margin-top: 2px;
  letter-spacing: 0;
}
.item-ratio {
  font-family: var(--serif);
  font-style: italic;
  color: var(--fg-faint);
  font-size: 13px;
  white-space: nowrap;
  font-weight: 400;
}
.item.active .item-ratio { color: var(--fg-muted); }

/* Main */
main {
  display: grid;
  grid-template-rows: auto 1fr auto;
  overflow: hidden;
  min-width: 0;
}

header.info {
  padding: 32px 44px 8px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 24px;
}
.ratio-label {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 400;
  font-style: italic;
  letter-spacing: -0.01em;
  line-height: 1;
}
.ratio-label .colon { margin: 0 6px; color: var(--fg-faint); font-style: normal; }
.ratio-label .name {
  font-family: var(--sans);
  font-style: normal;
  font-size: 12px;
  color: var(--fg-muted);
  letter-spacing: 0.04em;
  display: block;
  margin-top: 6px;
  font-weight: 400;
}
.size-hint {
  font-size: 12px;
  color: var(--fg-muted);
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  text-align: right;
}
.size-hint .px { color: var(--fg-faint); font-size: 11px; margin-left: 3px; }

.canvas-wrap {
  position: relative;
  margin: 20px 44px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
}
#canvas {
  display: block;
  touch-action: none;
  cursor: grab;
}
#canvas.dragging { cursor: grabbing; }
#canvas.empty { cursor: default; }

.empty-msg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 8px;
  color: var(--fg-faint);
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  pointer-events: none;
}
.empty-msg.hidden { display: none; }
.empty-msg .sub {
  font-family: var(--sans);
  font-style: normal;
  font-size: 11px;
  letter-spacing: 0.05em;
}

footer.controls {
  padding: 20px 44px 28px;
  display: flex;
  align-items: center;
  gap: 28px;
  border-top: 1px solid var(--line-soft);
  flex-wrap: wrap;
}

.btn {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  background: none;
  border: 1px solid var(--fg);
  color: var(--fg);
  padding: 10px 22px;
  cursor: pointer;
  transition: all 0.2s ease;
  border-radius: 0;
}
.btn:hover:not(:disabled) { background: var(--fg); color: var(--bg); }
.btn:disabled {
  border-color: var(--fg-faint);
  color: var(--fg-faint);
  cursor: not-allowed;
}

.split-controls {
  display: flex;
  gap: 28px;
  align-items: center;
  margin-left: auto;
}
.split-controls label {
  display: flex;
  align-items: baseline;
  gap: 10px;
  font-size: 11px;
  color: var(--fg-muted);
  letter-spacing: 0.06em;
}
.split-controls input {
  width: 52px;
  padding: 6px 4px;
  border: none;
  border-bottom: 1px solid var(--line);
  background: transparent;
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  font-weight: 500;
  text-align: center;
  color: var(--fg);
  transition: border-color 0.2s;
}
.split-controls input:focus {
  outline: none;
  border-bottom-color: var(--fg);
}
.split-controls input::-webkit-outer-spin-button,
.split-controls input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
.split-controls input[type=number] { -moz-appearance: textfield; }

@media (max-width: 760px) {
  body { grid-template-columns: 1fr; grid-template-rows: 220px 1fr; }
  aside { border-right: none; border-bottom: 1px solid var(--line); }
  .brand { padding: 18px 22px 14px; font-size: 24px; }
  header.info { padding: 18px 22px 4px; flex-direction: column; align-items: flex-start; gap: 6px; }
  .size-hint { text-align: left; }
  .canvas-wrap { margin: 14px 22px; }
  footer.controls { padding: 16px 22px 22px; gap: 18px; }
  .split-controls { margin-left: 0; gap: 18px; }
}
</style>

<aside>
  <div class="brand">aspect<span class="dot">.</span></div>
  <nav id="categories"></nav>
</aside>

<main>
  <header class="info">
    <div class="ratio-label" id="ratioLabel">
      <span id="ratioText">—<span class="colon">:</span>—</span>
      <span class="name" id="ratioName">比率を選択してください</span>
    </div>
    <div class="size-hint" id="sizeHint"></div>
  </header>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="canvas" class="empty"></canvas>
    <div class="empty-msg" id="emptyMsg">
      <span>no image</span>
      <span class="sub">左から比率を選び、画像を読み込んでください</span>
    </div>
  </div>

  <footer class="controls">
    <input type="file" id="file" accept="image/*" hidden>
    <label for="file" class="btn">画像</label>
    <button id="save" class="btn" disabled>保存 zip</button>
    <div class="split-controls">
      <label>横 <input type="number" id="splitW" min="1" value="1"></label>
      <label>縦 <input type="number" id="splitH" min="1" value="1"></label>
    </div>
  </footer>
</main>

      `;
      el.addEventListener('click', () => selectItem(it, el));
      items.appendChild(el);
    });
    wrap.appendChild(header);
    wrap.appendChild(items);
    root.appendChild(wrap);
  });
}

function selectItem(item, el) {
  state.ratio = item;
  if (state.activeItemEl) state.activeItemEl.classList.remove('active');
  el.classList.add('active');
  state.activeItemEl = el;

  ratioText.innerHTML = `${item.w}<span class="colon">:</span>${item.h}`;
  ratioName.textContent = item.name;
  recalculateFrame();
  draw();
  updateSizeHint();
  updateSaveBtn();
}

/* ===== Layout ===== */
function resizeCanvas() {
  const cw = wrap.clientWidth;
  const ch = wrap.clientHeight;
  if (cw <= 0 || ch <= 0) return;
  const dpr = window.devicePixelRatio || 1;
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  canvas.width = Math.floor(cw * dpr);
  canvas.height = Math.floor(ch * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  state.canvasW = cw;
  state.canvasH = ch;
  recalculateImageLayout();
  recalculateFrame();
  draw();
  updateSizeHint();
}

function recalculateImageLayout() {
  if (!state.image) return;
  const cw = state.canvasW;
  const ch = state.canvasH;
  const r = state.image.naturalWidth / state.image.naturalHeight;
  let dw = cw, dh = cw / r;
  if (dh > ch) { dh = ch; dw = ch * r; }
  state.imgW = dw; state.imgH = dh;
  state.imgX = (cw - dw) / 2;
  state.imgY = (ch - dh) / 2;
}

function getEffectiveRatio() {
  if (!state.ratio) return 1;
  return (state.ratio.w * state.splitW) / (state.ratio.h * state.splitH);
}

function recalculateFrame() {
  if (!state.image || !state.ratio) return;
  const target = getEffectiveRatio();
  // Try max width
  let fw = state.imgW;
  let fh = fw / target;
  if (fh > state.imgH) { fh = state.imgH; fw = fh * target; }
  state.frameW = fw;
  state.frameH = fh;
  state.frameX = state.imgX + (state.imgW - fw) / 2;
  state.frameY = state.imgY + (state.imgH - fh) / 2;
}

/* ===== Drawing ===== */
function draw() {
  ctx.clearRect(0, 0, state.canvasW, state.canvasH);
  if (!state.image) return;

  ctx.drawImage(state.image, state.imgX, state.imgY, state.imgW, state.imgH);

  if (!state.ratio) return;

  // Dark mask outside frame, only over image area
  ctx.fillStyle = 'rgba(20, 20, 20, 0.5)';
  // top band
  if (state.frameY > state.imgY)
    ctx.fillRect(state.imgX, state.imgY, state.imgW, state.frameY - state.imgY);
  // bottom band
  const fBottom = state.frameY + state.frameH;
  const iBottom = state.imgY + state.imgH;
  if (fBottom < iBottom)
    ctx.fillRect(state.imgX, fBottom, state.imgW, iBottom - fBottom);
  // left
  if (state.frameX > state.imgX)
    ctx.fillRect(state.imgX, state.frameY, state.frameX - state.imgX, state.frameH);
  // right
  const fRight = state.frameX + state.frameW;
  const iRight = state.imgX + state.imgW;
  if (fRight < iRight)
    ctx.fillRect(fRight, state.frameY, iRight - fRight, state.frameH);

  // Frame border
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(state.frameX + 0.5, state.frameY + 0.5, state.frameW - 1, state.frameH - 1);

  // Split dotted lines
  if (state.splitW > 1 || state.splitH > 1) {
    ctx.save();
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)';
    ctx.lineWidth = 1;
    for (let i = 1; i < state.splitW; i++) {
      const x = state.frameX + (state.frameW * i) / state.splitW;
      ctx.beginPath();
      ctx.moveTo(x + 0.5, state.frameY);
      ctx.lineTo(x + 0.5, state.frameY + state.frameH);
      ctx.stroke();
    }
    for (let j = 1; j < state.splitH; j++) {
      const y = state.frameY + (state.frameH * j) / state.splitH;
      ctx.beginPath();
      ctx.moveTo(state.frameX, y + 0.5);
      ctx.lineTo(state.frameX + state.frameW, y + 0.5);
      ctx.stroke();
    }
    ctx.restore();
  }
}

function updateSizeHint() {
  if (!state.ratio) { sizeHint.textContent = ''; return; }
  if (state.image) {
    const sx = state.image.naturalWidth / state.imgW;
    const sy = state.image.naturalHeight / state.imgH;
    const cellW = Math.round((state.frameW / state.splitW) * sx);
    const cellH = Math.round((state.frameH / state.splitH) * sy);
    const totalW = Math.round(state.frameW * sx);
    const totalH = Math.round(state.frameH * sy);
    sizeHint.innerHTML = `1セル ${cellW} × ${cellH} <span class="px">px</span> ／ 全体 ${totalW} × ${totalH} <span class="px">px</span>`;
  } else {
    sizeHint.innerHTML = `${state.ratio.w} : ${state.ratio.h}`;
  }
}

function updateEmpty() {
  if (state.image) {
    emptyMsg.classList.add('hidden');
    canvas.classList.remove('empty');
  } else {
    emptyMsg.classList.remove('hidden');
    canvas.classList.add('empty');
  }
}

function updateSaveBtn() {
  saveBtn.disabled = !(state.image && state.ratio);
}

/* ===== Image loading ===== */
fileInput.addEventListener('change', (e) => {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      state.image = img;
      recalculateImageLayout();
      recalculateFrame();
      updateEmpty();
      draw();
      updateSizeHint();
      updateSaveBtn();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(f);
});

/* ===== Drag ===== */
function localPos(e) {
  const r = canvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

canvas.addEventListener('pointerdown', (e) => {
  if (!state.image || !state.ratio) return;
  const { x, y } = localPos(e);
  if (x >= state.frameX && x <= state.frameX + state.frameW &&
      y >= state.frameY && y <= state.frameY + state.frameH) {
    state.dragging = true;
    state.dragOffX = x - state.frameX;
    state.dragOffY = y - state.frameY;
    canvas.classList.add('dragging');
    canvas.setPointerCapture(e.pointerId);
  }
});
canvas.addEventListener('pointermove', (e) => {
  if (!state.dragging) return;
  const { x, y } = localPos(e);
  let nx = x - state.dragOffX;
  let ny = y - state.dragOffY;
  nx = Math.max(state.imgX, Math.min(state.imgX + state.imgW - state.frameW, nx));
  ny = Math.max(state.imgY, Math.min(state.imgY + state.imgH - state.frameH, ny));
  state.frameX = nx;
  state.frameY = ny;
  draw();
});
function endDrag() {
  if (!state.dragging) return;
  state.dragging = false;
  canvas.classList.remove('dragging');
}
canvas.addEventListener('pointerup', endDrag);
canvas.addEventListener('pointercancel', endDrag);

/* ===== Split inputs ===== */
function readSplits() {
  let w = parseInt(splitWInput.value, 10);
  let h = parseInt(splitHInput.value, 10);
  if (!Number.isFinite(w) || w < 1) w = 1;
  if (!Number.isFinite(h) || h < 1) h = 1;
  if (w > 50) w = 50;
  if (h > 50) h = 50;
  splitWInput.value = w;
  splitHInput.value = h;
  state.splitW = w;
  state.splitH = h;
  recalculateFrame();
  draw();
  updateSizeHint();
}
splitWInput.addEventListener('input', readSplits);
splitHInput.addEventListener('input', readSplits);
splitWInput.addEventListener('change', readSplits);
splitHInput.addEventListener('change', readSplits);

/* ===== Save ===== */
function sanitize(name) {
  return name.replace(/[\/\\?%*:|"<>]/g, '_').trim() || 'aspect';
}

saveBtn.addEventListener('click', async () => {
  if (!state.image || !state.ratio) return;
  saveBtn.disabled = true;
  const original = saveBtn.textContent;
  saveBtn.textContent = '書き出し中…';
  try {
    const zip = new JSZip();
    const total = state.splitW * state.splitH;
    const padLen = Math.max(2, String(total).length);

    const sx = state.image.naturalWidth / state.imgW;
    const sy = state.image.naturalHeight / state.imgH;
    const cellDispW = state.frameW / state.splitW;
    const cellDispH = state.frameH / state.splitH;

    let idx = 1;
    for (let j = 0; j < state.splitH; j++) {
      for (let i = 0; i < state.splitW; i++) {
        const srcX = (state.frameX + i * cellDispW - state.imgX) * sx;
        const srcY = (state.frameY + j * cellDispH - state.imgY) * sy;
        const srcW = cellDispW * sx;
        const srcH = cellDispH * sy;
        const off = document.createElement('canvas');
        off.width = Math.max(1, Math.round(srcW));
        off.height = Math.max(1, Math.round(srcH));
        const octx = off.getContext('2d');
        octx.drawImage(state.image, srcX, srcY, srcW, srcH, 0, 0, off.width, off.height);
        const blob = await new Promise(res => off.toBlob(res, 'image/png'));
        zip.file(String(idx).padStart(padLen, '0') + '.png', blob);
        idx++;
      }
    }
    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const filename = sanitize(state.ratio.name) + `_${state.splitW}x${state.splitH}.zip`;
    const url = URL.createObjectURL(zipBlob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  } finally {
    saveBtn.textContent = original;
    updateSaveBtn();
  }
});

/* ===== Init ===== */
renderSidebar();
window.addEventListener('resize', resizeCanvas);
new ResizeObserver(resizeCanvas).observe(wrap);
resizeCanvas();
updateEmpty();
</script>
</body>
</html>
