<style>
/* ===== クリエくん（メニュー表メイカー） ===== */
.crekun-overlay{ position:fixed; inset:0; z-index:6000; background:#eef3f5; display:flex; flex-direction:column; }
.crekun-overlay[hidden]{ display:none; }
.cre-head{ display:flex; align-items:center; gap:10px; padding:10px 14px; background:#fff; box-shadow:0 2px 10px rgba(0,0,0,.06); flex-shrink:0; }
.cre-head .cre-title{ font-weight:800; color:#2c3e50; font-size:15px; letter-spacing:.04em; }
.cre-head .cre-sub{ font-size:11px; color:#8aa0ac; font-weight:600; }
.cre-close{ margin-left:auto; width:34px; height:34px; border:none; background:#f0f4f6; border-radius:10px; font-size:20px; color:#5b6b76; cursor:pointer; }
.cre-close:hover{ background:#e3eaed; }

/* ステップバー */
.cre-stepbar{ display:flex; gap:6px; padding:8px 12px; background:#fff; overflow-x:auto; flex-shrink:0; border-top:1px solid #eef2f4; }
.cre-step{ display:flex; align-items:center; gap:6px; border:none; background:#f1f5f7; color:#7f939f; border-radius:20px; padding:6px 12px; font-size:12px; font-weight:700; white-space:nowrap; cursor:pointer; flex-shrink:0; }
.cre-step .cre-step-n{ width:18px; height:18px; border-radius:50%; background:#cdd9df; color:#fff; display:flex; align-items:center; justify-content:center; font-size:11px; }
.cre-step.active{ background:#5b9cb8; color:#fff; }
.cre-step.active .cre-step-n{ background:#fff; color:#5b9cb8; }
.cre-step.done .cre-step-n{ background:#7fb89c; }

/* 本体: プレビュー + パネル */
.cre-body{ flex:1; display:flex; min-height:0; }
.cre-stage{ flex:1.1; display:flex; align-items:center; justify-content:center; padding:16px; background:#dde7eb; min-width:0; }
.cre-stage canvas{ max-width:100%; max-height:100%; box-shadow:0 8px 30px rgba(0,0,0,.18); border-radius:4px; background:#fff; }
.cre-panel{ flex:1; max-width:430px; background:#f7fafb; overflow-y:auto; padding:14px 16px 30px; box-shadow:-2px 0 12px rgba(0,0,0,.05); }

@media (max-width:760px){
  .cre-body{ flex-direction:column; }
  .cre-stage{ flex:none; height:34vh; padding:10px; position:sticky; top:0; }
  .cre-panel{ max-width:none; flex:1; box-shadow:0 -2px 12px rgba(0,0,0,.05); }
}

/* パネル内部品 */
.cre-h{ font-size:15px; font-weight:800; color:#2c3e50; margin:4px 0 10px; }
.cre-h.sub{ font-size:13px; margin-top:18px; color:#5b6b76; }
.cre-note{ font-size:11.5px; color:#8aa0ac; line-height:1.5; margin:-4px 0 12px; }
.cre-field{ display:block; margin-bottom:12px; }
.cre-flabel{ display:block; font-size:11.5px; font-weight:700; color:#6b7d88; margin-bottom:5px; }
.cre-in{ width:100%; box-sizing:border-box; border:1.5px solid #dde6ea; border-radius:10px; padding:9px 11px; font-size:14px; background:#fff; color:#2c3e50; outline:none; }
.cre-in:focus{ border-color:#5b9cb8; }
.cre-in.tight{ padding:7px 9px; font-size:13px; }
.cre-in.num{ width:72px; } .cre-in.unit{ width:48px; } .cre-in.sec{ width:74px; }

.cre-chips,.cre-palrow,.cre-ratiogrid{ display:flex; flex-wrap:wrap; gap:8px; }
.cre-chip{ border:1.5px solid #dde6ea; background:#fff; color:#5b6b76; border-radius:20px; padding:7px 14px; font-size:13px; font-weight:700; cursor:pointer; }
.cre-chip.on{ background:#5b9cb8; color:#fff; border-color:#5b9cb8; }

/* テンプレ */
.cre-tplgrid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.cre-tplcard{ border:2px solid #e2eaee; border-radius:12px; background:#fff; padding:8px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px; }
.cre-tplcard.on{ border-color:#5b9cb8; box-shadow:0 0 0 3px rgba(91,156,184,.16); }
.cre-tplthumb{ width:100%; height:auto; border-radius:6px; background:#fff; }
.cre-tpllabel{ font-size:12px; font-weight:700; color:#5b6b76; }

/* パレット */
.cre-palchip{ width:46px; height:38px; border-radius:10px; border:2px solid #e2eaee; cursor:pointer; display:flex; align-items:flex-end; justify-content:center; gap:2px; padding-bottom:4px; overflow:hidden; }
.cre-palchip.on{ border-color:#5b9cb8; box-shadow:0 0 0 3px rgba(91,156,184,.16); }
.cre-palchip i{ width:8px; height:8px; border-radius:50%; display:block; }

/* 比率 */
.cre-ratiocard{ border:2px solid #e2eaee; border-radius:10px; background:#fff; cursor:pointer; padding:8px; display:flex; flex-direction:column; align-items:center; gap:6px; width:86px; }
.cre-ratiocard.on{ border-color:#5b9cb8; box-shadow:0 0 0 3px rgba(91,156,184,.16); }
.cre-ratiocard span{ font-size:10.5px; font-weight:700; color:#5b6b76; text-align:center; }
.cre-ratiobox{ background:#cfe0e7; border-radius:3px; height:46px; max-width:46px; }
.cre-searchres{ display:flex; flex-direction:column; gap:4px; margin-top:8px; max-height:230px; overflow-y:auto; }
.cre-searchitem{ display:flex; justify-content:space-between; align-items:center; border:1.5px solid #e6edf0; background:#fff; border-radius:8px; padding:8px 11px; cursor:pointer; font-size:13px; color:#3a4a54; }
.cre-searchitem.on{ border-color:#5b9cb8; background:#eef6f9; }
.cre-searchitem em{ font-style:italic; color:#9aacb6; font-size:12px; }

/* 商品リスト */
.cre-itemlist{ display:flex; flex-direction:column; gap:10px; margin-bottom:10px; }
.cre-itemrow{ border:1.5px solid #e6edf0; border-radius:12px; background:#fff; padding:10px; display:flex; flex-direction:column; gap:7px; }
.cre-itemhead{ display:flex; align-items:center; gap:8px; }
.cre-itemicon{ width:38px; height:38px; flex-shrink:0; background:#f4f8fa; border-radius:8px; }
.cre-itemr2{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.cre-x{ width:28px; height:28px; border:none; background:#f4f0f2; color:#c06b8a; border-radius:8px; font-size:17px; cursor:pointer; flex-shrink:0; }
.cre-rec{ border:1.5px solid #e6c6d4; background:#fff; color:#c06b8a; border-radius:18px; padding:5px 10px; font-size:11.5px; font-weight:700; cursor:pointer; margin-left:auto; }
.cre-rec.on{ background:#e0588f; color:#fff; border-color:#e0588f; }
.cre-iconwrap{ padding-top:6px; }
.cre-icontabs{ display:flex; gap:6px; margin-bottom:7px; }
.cre-icontab{ flex:1; border:1.5px solid #e6edf0; background:#fff; color:#7f939f; border-radius:8px; padding:6px 4px; font-size:12px; font-weight:700; cursor:pointer; }
.cre-icontab.on{ background:#5b9cb8; color:#fff; border-color:#5b9cb8; }
.cre-seg{ display:flex; gap:0; border:1.5px solid #dde6ea; border-radius:10px; overflow:hidden; }
.cre-segbtn{ flex:1; border:none; background:#fff; color:#6b7d88; padding:9px 4px; font-size:13px; font-weight:700; cursor:pointer; border-right:1px solid #eef2f4; }
.cre-segbtn:last-child{ border-right:none; }
.cre-segbtn.on{ background:#5b9cb8; color:#fff; }
.cre-iconpick{ display:flex; flex-wrap:wrap; gap:5px; padding-top:0; }
.cre-iconopt{ width:40px; height:40px; border:1.5px solid #e6edf0; border-radius:9px; background:#fff; cursor:pointer; padding:3px; }
.cre-iconopt.on{ border-color:#5b9cb8; background:#eef6f9; }

/* 仕上げ */
.cre-slider{ display:flex; align-items:center; gap:10px; }
.cre-slider input[type=range]{ flex:1; accent-color:#5b9cb8; }
.cre-sval{ font-size:12px; font-weight:700; color:#5b6b76; width:42px; text-align:right; }
.cre-toggle{ border:1.5px solid #dde6ea; background:#fff; color:#5b6b76; border-radius:10px; padding:8px 16px; font-size:13px; font-weight:700; cursor:pointer; }
.cre-toggle.on{ background:#5b9cb8; color:#fff; border-color:#5b9cb8; }
.cre-colrow{ display:flex; gap:10px; flex-wrap:wrap; }
.cre-colcell{ display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10.5px; color:#6b7d88; font-weight:700; }
.cre-colcell input[type=color]{ width:42px; height:34px; border:1.5px solid #dde6ea; border-radius:8px; background:#fff; cursor:pointer; padding:2px; }

/* ボタン */
.cre-btn{ border:none; background:#5b9cb8; color:#fff; border-radius:11px; padding:11px 18px; font-size:14px; font-weight:800; cursor:pointer; }
.cre-btn:hover{ background:#4f8aa3; }
.cre-btn.ghost{ background:#fff; color:#5b9cb8; border:1.5px solid #c6dbe4; }
.cre-btn.link{ background:transparent; color:#8aa0ac; padding:11px 8px; }
.cre-btn.small{ padding:7px 4px; font-size:12px; }
.cre-btn.full{ width:100%; margin-top:4px; }
.cre-btn.big{ padding:14px; font-size:15px; margin-top:14px; }
.cre-btn:disabled{ opacity:.4; cursor:default; }
.cre-nav{ display:flex; align-items:center; gap:8px; margin-top:20px; padding-top:14px; border-top:1px solid #e6edf0; }
.cre-nav .cre-btn:last-child{ margin-left:auto; }
</style>

</div>

    let curGenre=genreOf(it.icon)||'drink';
    ['food','drink','dessert'].forEach(g=>{ const tb=document.createElement('button'); tb.className='cre-icontab'+(g===curGenre?' on':''); tb.textContent=GENRE_LABEL[g]; tb.addEventListener('click',()=>{ curGenre=g; tabs.querySelectorAll('.cre-icontab').forEach(x=>x.classList.remove('on')); tb.classList.add('on'); fillIcons(); }); tabs.appendChild(tb); });
    function fillIcons(){ grid.innerHTML=''; ICON_GENRE[curGenre].concat(['none']).forEach(name=>{ const b=document.createElement('button'); b.className='cre-iconopt'+(it.icon===name?' on':''); b.title=ICON_LABEL[name]||name; const cv=document.createElement('canvas'); cv.width=34; cv.height=34; const cc=cv.getContext('2d'); cc.lineCap='round'; cc.lineJoin='round'; if(ICONS[name]) ICONS[name](cc,17,17,30,cre.pal?cre.pal.accent:'#c2410c'); b.appendChild(cv); const lb=document.createElement('span'); lb.textContent=(name==='none'?'なし':(ICON_LABEL[name]||name)); lb.style.cssText='font-size:9px;line-height:1.1;margin-top:2px;max-width:46px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--cre-sub,#8a7f6b)'; b.style.cssText='display:flex;flex-direction:column;align-items:center;height:auto;padding:5px 3px'; b.appendChild(lb); b.addEventListener('click',()=>{ it.icon=name; grid.querySelectorAll('.cre-iconopt').forEach(x=>x.classList.remove('on')); b.classList.add('on'); drawMini(); renderPreview(); }); grid.appendChild(b); }); }
    fillIcons(); wrapEl.appendChild(tabs); wrapEl.appendChild(grid);
    icBtn.addEventListener('click',()=>{ wrapEl.style.display=wrapEl.style.display==='none'?'block':'none'; });
    row.appendChild(icBtn); row.appendChild(wrapEl);
    const imgBtn=document.createElement('button'); imgBtn.className='cre-btn link small'; imgBtn.textContent=it.photo?'商品画像 ✓（変更）':'商品画像を貼る'; const imgFile=document.createElement('input'); imgFile.type='file'; imgFile.accept='image/*'; imgFile.style.display='none';
    const rmImg=document.createElement('button'); rmImg.className='cre-btn link small cre-imgrm'; rmImg.textContent='画像を外す'; rmImg.addEventListener('click',()=>{ it.photo=null; drawMini(); renderPreview(); imgBtn.textContent='商品画像を貼る'; rmImg.remove(); });
    imgBtn.addEventListener('click',()=>imgFile.click()); imgFile.addEventListener('change',e=>{ const f=e.target.files[0]; if(!f) return; const img=new Image(); img.onload=()=>{ it.photo=img; cre._fromSample=false; drawMini(); renderPreview(); imgBtn.textContent='商品画像 ✓（変更）'; if(!row.querySelector('.cre-imgrm')) row.appendChild(rmImg); }; img.src=URL.createObjectURL(f); });
    row.appendChild(imgBtn); row.appendChild(imgFile); if(it.photo) row.appendChild(rmImg);
    return row;
  }

  function stepStyle(){
    const h=document.createElement('div'); h.className='cre-h'; h.textContent='仕上げ調整'; panel.appendChild(h);
    const fsWrap=document.createElement('div'); fsWrap.className='cre-slider';
    const fsIn=document.createElement('input'); fsIn.type='range'; fsIn.min='0.8'; fsIn.max='1.3'; fsIn.step='0.02'; fsIn.value=String(cre.fontScale);
    const fsVal=document.createElement('span'); fsVal.className='cre-sval'; fsVal.textContent=Math.round(cre.fontScale*100)+'%';
    fsIn.addEventListener('input',()=>{ cre.fontScale=parseFloat(fsIn.value); fsVal.textContent=Math.round(cre.fontScale*100)+'%'; renderPreview(); }); fsWrap.appendChild(fsIn); fsWrap.appendChild(fsVal); panel.appendChild(field('文字の大きさ（自動で枠内に収まります）', fsWrap));
    // 質感
    const txh=document.createElement('div'); txh.className='cre-h sub'; txh.textContent='質感（テクスチャ）'; panel.appendChild(txh);
    panel.appendChild(segBtns([['none','なし'],['paper','紙'],['kraft','クラフト紙'],['washi','和紙'],['linen','リネン'],['canvas','キャンバス'],['wood','木目'],['stone','石・コンクリ'],['noise','ノイズ'],['dots','ドット'],['grid','方眼']], ()=>cre.texture, v=>cre.texture=v));
    const tsWrap=document.createElement('div'); tsWrap.className='cre-slider'; const tsIn=document.createElement('input'); tsIn.type='range'; tsIn.min='0.3'; tsIn.max='1.8'; tsIn.step='0.05'; tsIn.value=String(cre.textureStrength); const tsVal=document.createElement('span'); tsVal.className='cre-sval'; tsVal.textContent=Math.round(cre.textureStrength*100)+'%'; tsIn.addEventListener('input',()=>{ cre.textureStrength=parseFloat(tsIn.value); tsVal.textContent=Math.round(cre.textureStrength*100)+'%'; renderPreview(); }); tsWrap.appendChild(tsIn); tsWrap.appendChild(tsVal); panel.appendChild(field('質感の強さ', tsWrap));
    panel.appendChild(field('商品画像のふち（枠線）', segBtns([['on','あり'],['off','なし']], ()=>cre.itemPhotoBorder===false?'off':'on', v=>cre.itemPhotoBorder=(v==='on'))));
    const rh=document.createElement('div'); rh.className='cre-h sub'; rh.textContent='お部屋・背景の画像'; panel.appendChild(rh);
    
    const rmBtn=document.createElement('button'); rmBtn.className='cre-btn ghost full'; rmBtn.textContent=cre.roomImage?'背景を変更':'背景画像を読み込む'; const rmFile=document.createElement('input'); rmFile.type='file'; rmFile.accept='image/*'; rmFile.style.display='none'; rmBtn.addEventListener('click',()=>rmFile.click()); rmFile.addEventListener('change',e=>{ const f=e.target.files[0]; if(!f) return; const img=new Image(); img.onload=()=>{ cre.roomImage=img; renderStep(); }; img.src=URL.createObjectURL(f); }); panel.appendChild(rmBtn); panel.appendChild(rmFile);
    if(cre.roomImage){
      const mkSlider=(label,mn,mx,st,get,set,fmt)=>{ const wrap=document.createElement('div'); wrap.className='cre-slider'; const inp=document.createElement('input'); inp.type='range'; inp.min=mn; inp.max=mx; inp.step=st; inp.value=String(get()); const val=document.createElement('span'); val.className='cre-sval'; val.textContent=fmt(get()); inp.addEventListener('input',()=>{ set(parseFloat(inp.value)); val.textContent=fmt(get()); renderPreview(); }); wrap.appendChild(inp); wrap.appendChild(val); return field(label,wrap); };
      panel.appendChild(mkSlider('画像の大きさ',1,2.2,0.05,()=>cre.roomSize,v=>cre.roomSize=v,v=>Math.round(v*100)+'%'));
      panel.appendChild(mkSlider('上下の位置',-1,1,0.05,()=>cre.roomPosY,v=>cre.roomPosY=v,v=>(v>0.02?'下':(v<-0.02?'上':'中央'))));
      panel.appendChild(mkSlider('画像の濃さ（不透明度）',0.05,0.9,0.05,()=>cre.roomOpacity,v=>cre.roomOpacity=v,v=>Math.round(v*100)+'%'));
      const rrm=document.createElement('button'); rrm.className='cre-btn link small'; rrm.textContent='↩ 背景を外す'; rrm.addEventListener('click',()=>{ cre.roomImage=null; cre.roomSize=1; cre.roomPosY=0; cre.roomOpacity=0.2; renderStep(); }); panel.appendChild(rrm);
    }
    // 色
    const colRow=document.createElement('div'); colRow.className='cre-colrow';
    [['bg','背景'],['card','カード'],['ink','文字'],['sub','補助'],['accent','アクセント'],['accent2','サブ']].forEach(([key,lb])=>{ const w=document.createElement('label'); w.className='cre-colcell'; const ci=document.createElement('input'); ci.type='color'; ci.value=toHex(cre.pal[key]); ci.addEventListener('input',()=>{ cre.pal[key]=ci.value; renderPreview(); }); const s=document.createElement('span'); s.textContent=lb; w.appendChild(ci); w.appendChild(s); colRow.appendChild(w); });
    panel.appendChild(field('色を細かく調整（6色）', colRow));
    const reset=document.createElement('button'); reset.className='cre-btn link small'; reset.textContent='↺ テーマの色に戻す'; reset.addEventListener('click',()=>{ if(cre.palBase){ cre.pal=Object.assign({},cre.palBase); renderStep(); } }); panel.appendChild(reset);
    // お店・スタッフ画像
    const ph=document.createElement('div'); ph.className='cre-h sub'; ph.textContent='お店・スタッフ画像'; panel.appendChild(ph);
    
    const avBtn=document.createElement('button'); avBtn.className='cre-btn ghost full'; avBtn.textContent=cre.photo?'画像を変更':'画像を読み込む'; const avFile=document.createElement('input'); avFile.type='file'; avFile.accept='image/*'; avFile.style.display='none'; avBtn.addEventListener('click',()=>avFile.click()); avFile.addEventListener('change',e=>{ const f=e.target.files[0]; if(!f) return; const img=new Image(); img.onload=()=>{ cre.photo=img; renderStep(); }; img.src=URL.createObjectURL(f); }); panel.appendChild(avBtn); panel.appendChild(avFile);
    if(cre.photo){
      panel.appendChild(field('位置', segBtns([['br','右下'],['bl','左下'],['tr','右上'],['tl','左上']], ()=>cre.photoPos, v=>cre.photoPos=v)));
      panel.appendChild(field('形', segBtns([['circle','丸'],['round','角丸']], ()=>cre.photoShape, v=>cre.photoShape=v)));
      const szWrap=document.createElement('div'); szWrap.className='cre-slider'; const szIn=document.createElement('input'); szIn.type='range'; szIn.min='0.14'; szIn.max='0.34'; szIn.step='0.01'; szIn.value=String(cre.photoSize); const szVal=document.createElement('span'); szVal.className='cre-sval'; szVal.textContent=Math.round(cre.photoSize*100)+'%'; szIn.addEventListener('input',()=>{ cre.photoSize=parseFloat(szIn.value); szVal.textContent=Math.round(cre.photoSize*100)+'%'; renderPreview(); }); szWrap.appendChild(szIn); szWrap.appendChild(szVal); panel.appendChild(field('大きさ', szWrap));
      const rm=document.createElement('button'); rm.className='cre-btn link small'; rm.textContent='↩ 戻す（画像を外す）'; rm.addEventListener('click',()=>{ cre.photo=null; cre.photoPos='br'; cre.photoSize=0.22; cre.photoShape='circle'; renderStep(); }); panel.appendChild(rm);
    }
    const exp=document.createElement('button'); exp.className='cre-btn full big'; exp.textContent='⬇ 画像をダウンロード'; exp.addEventListener('click',exportImage); panel.appendChild(exp);
  }

  function toHex(col){ if(!col) return '#000000'; if(col[0]==='#'){ if(col.length===4) return '#'+col[1]+col[1]+col[2]+col[2]+col[3]+col[3]; return col.slice(0,7); } const m=col.match(/\d+/g); if(m){ return '#'+m.slice(0,3).map(n=>(+n).toString(16).padStart(2,'0')).join(''); } return '#000000'; }
  function exportImage(){
    const long=Math.max(cre.ratioW,cre.ratioH); const sc=Math.min(2.4, 2000/long);
    const W=Math.round(cre.ratioW*sc), H=Math.round(cre.ratioH*sc);
    const cv=document.createElement('canvas'); renderTo(cv,W,H);
    cv.toBlob(b=>{ if(!b) return; const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=(cre.store||'メニュー表')+'.png'; document.body.appendChild(a); a.click(); a.remove(); if(typeof window.showToast==='function') window.showToast('画像をダウンロードしました'); setTimeout(()=>URL.revokeObjectURL(a.href),4000); },'image/png');
  }
  function init(){ if(!cre.pal){ applyCat('cafe'); } cre.step=0; renderStep(); preloadFonts().then(function(){ try{ renderStep(); }catch(e){} }); }
  window.__creInit=init;
  const closeBtn=$('creClose'); if(closeBtn) closeBtn.addEventListener('click',()=>{ ov.hidden=true; });
})();


</script>
<script>
(function(){ var c=document.getElementById('creClose'); if(c){ c.addEventListener('click', function(){ if(history.length>1){ history.back(); } else { location.href='./'; } }); } if(window.__creInit) window.__creInit(); })();
</script>
</body>
